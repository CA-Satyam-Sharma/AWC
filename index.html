function stockQtyRows(list){return list.length?list.map(p=>`<tr><td class="muted">${p.stockno||'—'}</td><td class="clik" onclick="openProdLedger('${p.id}')">${p.name}</td><td class="muted" style="font-size:11px">${p.cat}</td><td class="r"><span class="pill ${qtyOf(p.id)<=5?'low':'ok'}">${qtyOf(p.id)}</span></td></tr>`).join(''):`<tr><td colspan="4" class="empty">No products.</td></tr>`;}

let catQ='',catCat='';
function viewCatalog(){
  const cats=[...new Set(S.products.map(p=>p.cat))].sort();
  let list=S.products.filter(p=>(!catCat||p.cat===catCat)&&(!catQ||(p.name+' '+(p.stockno||'')+' '+p.cat).toLowerCase().includes(catQ.toLowerCase())));
  document.getElementById('view').innerHTML=`<h2 class="sec">Product Catalog <span class="muted">— prices shared · stock per center · click for ledger</span></h2>
  <div class="card"><div class="flex" style="margin-bottom:12px"><div style="flex:1;min-width:200px"><label>Search</label><input id="cq" value="${catQ}" oninput="catQ=this.value;refreshCat()"></div><div style="min-width:200px"><label>Category</label><select onchange="catCat=this.value;viewCatalog()"><option value="">All categories</option>${cats.map(c=>`<option ${c===catCat?'selected':''}>${c}</option>`).join('')}</select></div><button class="btn right" onclick="addProductModal()">+ New product</button></div>
    <div class="tablewrap"><table><thead><tr><th>Stock No.</th><th>Product</th><th class="r">VP</th><th class="r">MRP</th><th class="r">Bronze</th><th class="r">Gold</th><th class="r">Assoc 25%</th><th class="r">Supvr 50%</th><th class="r">On hand</th><th></th></tr></thead><tbody id="catbody">${catRows(list)}</tbody></table></div></div>`;
}
function catRows(list){return list.length?list.map(p=>`<tr><td class="muted">${p.stockno||'—'}</td><td class="clik" onclick="openProdLedger('${p.id}')">${p.name}<div class="muted" style="font-size:11px">${p.cat}</div></td><td class="r">${vpf(p.vp)}</td><td class="r">${rs(p.mrp)}</td><td class="r">${rs(p.bronze)}</td><td class="r">${rs(p.gold)}</td><td class="r">${rs(p.assoc)}</td><td class="r">${rs(p.sup)}</td><td class="r"><span class="pill ${qtyOf(p.id)<=5?'low':'ok'}">${qtyOf(p.id)}</span></td><td class="r"><button class="btn sm ghost" onclick="editProductModal('${p.id}')">Edit</button></td></tr>`).join(''):`<tr><td colspan="10" class="empty">No products.</td></tr>`;}
function refreshCat(){let list=S.products.filter(p=>(!catCat||p.cat===catCat)&&(!catQ||(p.name+' '+(p.stockno||'')+' '+p.cat).toLowerCase().includes(catQ.toLowerCase())));document.getElementById('catbody').innerHTML=catRows(list);}
function addProductModal(){openModal(`<div class="flex" style="justify-content:space-between"><h3>New product</h3><span class="x" onclick="closeModal()">×</span></div><div class="grid2" style="margin-top:8px"><div><label>Stock No.</label><input id="np_sn"></div><div><label>Name</label><input id="np_name"></div><div><label>Category</label><input id="np_cat" value="CUSTOM"></div><div><label>Volume Points</label><input id="np_vp" type="number" value="0"></div><div><label>MRP</label><input id="np_mrp" type="number" value="0"></div><div><label>Default cost</label><input id="np_cost" type="number" value="0"></div><div><label>Opening stock (this center)</label><input id="np_stock" type="number" value="0"></div></div><div style="text-align:right;margin-top:12px"><button class="btn" onclick="saveNewProduct()">Add</button></div>`);}
function saveNewProduct(){const mrp=+v('np_mrp')||0;const st=+v('np_stock')||0;const id='P'+Date.now();S.products.push({id,stockno:v('np_sn'),name:v('np_name')||'Unnamed',cat:v('np_cat')||'CUSTOM',vp:+v('np_vp')||0,mrp,retail:mrp,bronze:mrp,silver:mrp,gold:mrp,assoc:mrp,sr:mrp,qp:mrp,sup:mrp});Object.keys(S.stock).forEach(cid=>{S.stock[cid][id]={qty:0,cost:+v('np_cost')||0};});if(st){setQty(id,st);ledgerAdd(today(),id,'OPENING',st,'—',0,'');}save();closeModal();viewCatalog();toast('Product added');}

function viewCustomers(){
  document.getElementById('view').innerHTML=`<h2 class="sec">Customers &amp; Members <span class="muted">— click a name for the ledger</span></h2>
  <div class="card"><div class="flex" style="margin-bottom:10px"><button class="btn right" onclick="addCustomerModal()">+ New customer</button></div>
   <table><thead><tr><th>Name</th><th>Type</th><th>Mobile</th><th>Default tier</th><th class="r">Sales (here)</th><th></th></tr></thead><tbody>${S.customers.map(c=>{const n=cSales().filter(s=>s.customerId===c.id).length;return `<tr><td class="clik" onclick="openCustLedger('${c.id}')">${c.name}</td><td><span class="pill ${c.kind==='member'?'ok':''}">${c.kind}</span></td><td class="muted">${c.mobile||'—'}</td><td>${tierLabel(c.tier)}</td><td class="r">${n}</td><td class="r"><button class="btn sm ghost" onclick="editCustomerModal('${c.id}')">Edit</button></td></tr>`;}).join('')}</tbody></table></div>`;
}
function addCustomerModal(){openModal(`<div class="flex" style="justify-content:space-between"><h3>New customer / member</h3><span class="x" onclick="closeModal()">×</span></div><div class="grid2" style="margin-top:8px"><div><label>Name</label><input id="nc_name"></div><div><label>Mobile</label><input id="nc_mobile"></div><div><label>Type</label><select id="nc_kind"><option value="customer">Walk-in customer</option><option value="member">Wellness member</option></select></div><div><label>Default price tier</label><select id="nc_tier">${TIERS.map(t=>`<option value="${t.k}">${t.label}</option>`).join('')}</select></div></div><div style="text-align:right;margin-top:12px"><button class="btn" onclick="saveCustomer()">Save</button></div>`);}
function saveCustomer(){S.customers.push({id:'C'+Date.now(),name:v('nc_name')||'Unnamed',mobile:v('nc_mobile'),kind:v('nc_kind'),tier:v('nc_tier')});save();closeModal();viewCustomers();toast('Customer added');}

let cart=[];
function cartRowsHTML(mode,tier){if(!cart.length)return `<tr><td colspan="6" class="empty">No items yet — search above.</td></tr>`;return cart.map((it,i)=>{const p=prod(it.productId);return `<tr><td>${p.name}<div class="muted" style="font-size:11px">on hand: ${qtyOf(p.id)}</div></td><td style="width:90px"><input type="number" min="1" value="${it.qty}" onchange="cartQty(${i},this.value,'${mode}','${tier||''}')"></td><td class="r" style="width:120px">${mode==='purchase'?`<input type="number" value="${it.unitPrice}" onchange="cartCost(${i},this.value)">`:rs(it.unitPrice)}</td><td class="r">${mode==='barter'?'—':rs(it.qty*it.unitPrice)}</td><td class="r">${vpf(it.qty*p.vp)}</td><td class="r"><button class="btn sm bad" onclick="cartDel(${i},'${mode}','${tier||''}')">✕</button></td></tr>`;}).join('');}
function cartQty(i,val,mode,tier){cart[i].qty=Math.max(1,+val||1);renderCart(mode,tier);}
function cartCost(i,val){cart[i].unitPrice=+val||0;renderCart('purchase');}
function cartDel(i,mode,tier){cart.splice(i,1);renderCart(mode,tier);}
function renderCart(mode,tier){document.getElementById('cartbody').innerHTML=cartRowsHTML(mode,tier);const sub=cart.reduce((a,it)=>a+it.qty*it.unitPrice,0),vp=cart.reduce((a,it)=>a+it.qty*prod(it.productId).vp,0);const sb=document.getElementById('subtot');if(sb)sb.textContent=rs(sub);const vt=document.getElementById('vptot');if(vt)vt.textContent=vpf(vp)+' VP';if(typeof refreshSaleSummary==='function')refreshSaleSummary();}
function pickerHTML(mode,tier){return `<div style="position:relative"><label>Add product (name or stock no.)</label><input id="pick" oninput="searchPick('${mode}','${tier||''}')" autocomplete="off"><div id="pickres"></div></div>`;}
function searchPick(mode,tier){const q=v('pick').toLowerCase().trim();const box=document.getElementById('pickres');if(!q){box.innerHTML='';return;}const hits=S.products.filter(p=>(p.name+' '+(p.stockno||'')).toLowerCase().includes(q)).slice(0,8);box.innerHTML=`<div class="search-results">${hits.map(p=>{const price=mode==='purchase'?costOf(p.id):(mode==='barter'?0:p[tierField(tier)]);return `<div onclick="addToCart('${p.id}','${mode}','${tier||''}')"><b>${p.name}</b> <span class="muted">· ${mode==='barter'?'VP '+vpf(p.vp):rs(price)} · stock ${qtyOf(p.id)}</span></div>`;}).join('')||'<div class="muted" style="padding:8px">No match</div>'}</div>`;}
function addToCart(pid,mode,tier){const p=prod(pid);const price=mode==='purchase'?costOf(p.id):(mode==='barter'?0:p[tierField(tier)]);const ex=cart.find(it=>it.productId===pid);if(ex)ex.qty++;else cart.push({productId:pid,qty:1,unitPrice:price});document.getElementById('pick').value='';document.getElementById('pickres').innerHTML='';renderCart(mode,tier);}

function viewPurchase(){cart=[];document.getElementById('view').innerHTML=`<h2 class="sec">Purchase / Restock <span class="muted">— ${curCenterObj().name}</span></h2><div class="card"><div class="grid3"><div><label>Supplier</label><input id="pu_sup" value="Herbalife"></div><div><label>Date</label><input id="pu_date" type="date" value="${today()}"></div><div><label>Reference</label><input id="pu_ref"></div></div><div style="margin-top:14px">${pickerHTML('purchase')}</div><div class="cart"><table class="lineitems"><thead><tr><th>Product</th><th>Qty</th><th class="r">Unit cost</th><th class="r">Amount</th><th class="r">VP</th><th></th></tr></thead><tbody id="cartbody">${cartRowsHTML('purchase')}</tbody></table></div><div class="totbar"><div><div class="t">Total VP</div><div class="v" id="vptot">0 VP</div></div><div><div class="t">Total cost</div><div class="v" id="subtot">₹0</div></div><button class="btn" onclick="savePurchase()">Save &amp; add to stock</button></div></div><div class="card" style="margin-top:16px"><h3>Recent purchases</h3>${tblPurchases()}</div>`;}
function savePurchase(){if(!cart.length)return toast('Add a product');const date=v('pu_date'),sup=v('pu_sup');const sub=cart.reduce((a,it)=>a+it.qty*it.unitPrice,0),vp=cart.reduce((a,it)=>a+it.qty*prod(it.productId).vp,0),no=nextNo('PUR');cart.forEach(it=>{const p=prod(it.productId);setQty(p.id,qtyOf(p.id)+it.qty);S.stock[curCenter][p.id].cost=it.unitPrice;ledgerAdd(date,p.id,'PURCHASE',it.qty,sup,it.qty*p.vp,no);});S.purchases.push({centerId:curCenter,no,supplier:sup,date,ref:v('pu_ref'),items:cart.map(it=>({...it,name:prod(it.productId).name})),subtotal:sub,totalVp:vp});save();toast('Purchase saved');viewPurchase();}
function tblPurchases(){const pp=cPurchases();if(!pp.length)return `<div class="empty">No purchases yet.</div>`;return `<table><thead><tr><th>No.</th><th>Date</th><th>Supplier</th><th class="r">Items</th><th class="r">VP</th><th class="r">Cost</th></tr></thead><tbody>${pp.slice().reverse().map(p=>`<tr><td>${p.no}</td><td>${p.date}</td><td>${p.supplier}</td><td class="r">${p.items.length}</td><td class="r">${vpf(p.totalVp)}</td><td class="r">${rs(p.subtotal)}</td></tr>`).join('')}</tbody></table>`;}

let saleTier='mrp';
function viewSales(){cart=[];saleTier=S.customers[0].tier;document.getElementById('view').innerHTML=`
  <div class="page-head">
    <div><h2>New Sale</h2><p>${curCenterObj().name} · fast billing with stock availability, VP, and payment status.</p></div>
    <div class="actions"><button class="btn ghost" onclick="addCustomerModal()">+ Add customer</button><button class="btn ghost" onclick="toast('Bill held locally')">Hold bill</button></div>
  </div>
  <div class="sales-layout">
    <div class="stack">
      <div class="card">
        <div class="grid3"><div><label>Customer / Member</label><select id="sa_cust" onchange="onCustChange()">${S.customers.map(c=>`<option value="${c.id}">${c.name} · ${c.kind}</option>`).join('')}</select></div><div><label>Price Tier</label><select id="sa_tier" onchange="onTierChange()">${TIERS.map(t=>`<option value="${t.k}" ${t.k===saleTier?'selected':''}>${t.label}</option>`).join('')}</select></div><div><label>Sale Date</label><input id="sa_date" type="date" value="${today()}"></div></div>
        <div class="tier-note" id="tiernote">Selling at <b>${tierLabel(saleTier)}</b> — unit prices read straight from the price-list column.</div>
        ${pickerHTML('sale',saleTier)}
        <div class="cart"><div class="flex" style="justify-content:space-between;align-items:center;margin-bottom:8px"><h3 style="margin:0">Cart</h3><span class="mini-metric">Search by product name or stock no.</span></div><div class="tablewrap" style="max-height:420px"><table class="lineitems"><thead><tr><th>Product</th><th>Qty</th><th class="r">Unit price</th><th class="r">Amount</th><th class="r">VP</th><th></th></tr></thead><tbody id="cartbody">${cartRowsHTML('sale',saleTier)}</tbody></table></div></div>
      </div>
      <div class="card"><div class="flex" style="justify-content:space-between;align-items:center"><h3 style="margin:0">Recent Sales</h3><span class="mini-metric">${cSales().length} invoices</span></div>${tblSales(cSales().slice().reverse())}</div>
    </div>
    <div class="card summary-card">
      <h3>Invoice Summary</h3>
      <div class="watch-row"><div><b id="sumcust">${S.customers[0].name}</b><div class="mini-metric" id="sumtier">${tierLabel(saleTier)}</div></div><span class="pill ok">Active</span></div>
      <div class="watch-row"><div><div class="t">Total VP</div><div class="v" id="vptot">0 VP</div></div><div class="r"><div class="t">Items</div><div class="v" id="sumitems">0</div></div></div>
      <div><div class="t">Total</div><div class="summary-total" id="subtot">₹0</div></div>
      <div class="grid2"><div><label>Status</label><select id="pay_status"><option value="paid">Paid now</option><option value="unpaid">Unpaid</option></select></div><div><label>Mode</label><select id="pay_mode"><option>Cash</option><option>UPI</option><option>Bank Transfer</option><option>Card</option></select></div></div>
      <div class="quick-actions" style="margin-top:14px"><button class="btn ghost" onclick="saveSale(false)">Save as unpaid</button><button class="btn" style="grid-column:span 2" onclick="saveSale(true)">Save &amp; mark paid</button></div>
    </div>
  </div>`;}
function refreshSaleSummary(){if(!document.getElementById('sa_cust'))return;const c=cust(v('sa_cust'));const sc=document.getElementById('sumcust'),st=document.getElementById('sumtier'),si=document.getElementById('sumitems');if(sc)sc.textContent=c.name;if(st)st.textContent=tierLabel(saleTier);if(si)si.textContent=cart.reduce((a,it)=>a+it.qty,0);}
function onCustChange(){const c=cust(v('sa_cust'));saleTier=c.tier;document.getElementById('sa_tier').value=saleTier;onTierChange();}
function onTierChange(){saleTier=v('sa_tier');document.getElementById('tiernote').innerHTML=`Selling at <b>${tierLabel(saleTier)}</b> — unit prices read straight from the price-list column.`;cart.forEach(it=>{it.unitPrice=prod(it.productId)[tierField(saleTier)];});document.getElementById('pick').setAttribute('oninput',`searchPick('sale','${saleTier}')`);renderCart('sale',saleTier);refreshSaleSummary();}
function saveSale(paid){if(!cart.length)return toast('Add a product');const bad=cart.find(it=>qtyOf(it.productId)<it.qty);if(bad)return toast('Not enough stock for '+prod(bad.productId).name);const date=v('sa_date'),c=cust(v('sa_cust')),no=nextNo('SAL');const sub=cart.reduce((a,it)=>a+it.qty*it.unitPrice,0),vp=cart.reduce((a,it)=>a+it.qty*prod(it.productId).vp,0);cart.forEach(it=>{const p=prod(it.productId);setQty(p.id,qtyOf(p.id)-it.qty);ledgerAdd(date,p.id,'SALE',-it.qty,c.name,it.qty*p.vp,no);});S.sales.push({centerId:curCenter,no,customerId:c.id,customerName:c.name,tier:saleTier,date,items:cart.map(it=>({...it,name:prod(it.productId).name,vp:prod(it.productId).vp})),subtotal:sub,totalVp:vp,status:paid?'paid':'unpaid',amountPaid:paid?sub:0,balance:paid?0:sub,payments:paid?[{amount:sub,mode:'Cash',date}]:[]});save();toast('Sale saved'+(paid?' · paid':''));viewSales();}
function tblSales(list,compact){if(!list.length)return `<div class="empty">No sales yet.</div>`;return `<table><thead><tr><th>No.</th><th>Customer</th><th>Tier</th><th class="r">VP</th><th class="r">Total</th><th class="r">Due</th><th>Status</th>${compact?'':'<th></th>'}</tr></thead><tbody>${list.map(s=>`<tr><td>${s.no}</td><td class="clik" onclick="openCustLedger('${s.customerId}')">${s.customerName}</td><td class="muted">${tierLabel(s.tier)}</td><td class="r">${vpf(s.totalVp)}</td><td class="r">${rs(s.subtotal)}</td><td class="r">${rs(s.balance)}</td><td><span class="pill ${s.status}">${s.status}</span></td>${compact?'':`<td class="r">${s.status!=='paid'?`<button class="btn sm" onclick="markPaid('${s.no}')">Mark paid</button> <button class="btn sm warn" onclick="partialModal('${s.no}')">Part</button> `:''}<button class="btn sm ghost" onclick="viewInvoice('${s.no}')">Invoice</button></td>`}</tr>`).join('')}</tbody></table>`;}
function markPaid(no){const s=S.sales.find(x=>x.no===no);s.payments.push({amount:s.balance,mode:'Cash',date:today()});s.amountPaid=s.subtotal;s.balance=0;s.status='paid';save();toast(no+' paid');viewSales();}
function partialModal(no){const s=S.sales.find(x=>x.no===no);openModal(`<div class="flex" style="justify-content:space-between"><h3>Record payment — ${no}</h3><span class="x" onclick="closeModal()">×</span></div><p class="muted" style="margin:6px 0">Balance due: <b>${rs(s.balance)}</b></p><div class="grid2"><div><label>Amount</label><input id="pp_amt" type="number" value="${s.balance}"></div><div><label>Mode</label><select id="pp_mode"><option>Cash</option><option>UPI</option><option>Bank Transfer</option><option>Card</option></select></div></div><div style="text-align:right;margin-top:12px"><button class="btn" onclick="recordPayment('${no}')">Record</button></div>`);}
function recordPayment(no){const s=S.sales.find(x=>x.no===no);const amt=Math.min(+v('pp_amt')||0,s.balance);s.payments.push({amount:amt,mode:v('pp_mode'),date:today()});s.amountPaid+=amt;s.balance=Math.round((s.balance-amt)*100)/100;s.status=s.balance<=0?'paid':'partial';save();closeModal();toast('Payment recorded');viewSales();}
function saleInvoiceHTML(no){const s=S.sales.find(x=>x.no===no);return `<p><b>${s.customerName}</b> · ${tierLabel(s.tier)} · ${s.date} · Invoice ${s.no}</p>`+tableToHTML(['Item','Qty','Rate','Amount','VP'],s.items.map(it=>[it.name,it.qty,rs(it.unitPrice),rs(it.qty*it.unitPrice),vpf(it.qty*it.vp)]),['Total','','',rs(s.subtotal),vpf(s.totalVp)])+`<p>Paid: ${rs(s.amountPaid)} · Balance due: ${rs(s.balance)} · Status: ${s.status}</p>`;}
function viewInvoice(no){openModal(`<div class="flex" style="justify-content:space-between"><h3>Sale ${no}</h3><span class="x" onclick="closeModal()">×</span></div>${saleInvoiceHTML(no)}<div style="text-align:right;margin-top:12px"><button class="btn blue" onclick="printHTML('Sale Invoice ${no}',saleInvoiceHTML('${no}'),true)">Print / PDF</button></div>`);}

function viewBarter(){cart=[];document.getElementById('view').innerHTML=`<h2 class="sec">Barter / Stock Transfer <span class="muted">— ${curCenterObj().name}</span></h2><div class="card"><div class="grid3"><div><label>Direction</label><select id="ba_dir"><option value="OUT">Barter OUT (give)</option><option value="IN">Barter IN (receive)</option><option value="TRANSFER">Transfer to center</option></select></div><div><label>Give to / Receive from</label><select id="ba_totype" onchange="barterToType()"><option value="external">External / Center</option><option value="member">Member / Customer</option></select></div><div><label>Date</label><input id="ba_date" type="date" value="${today()}"></div></div><div id="ba_party" style="margin-top:4px"><label>Counterparty / Center</label><input id="ba_cp" placeholder="e.g. Sector-17 Center"></div><div class="tier-note">Barter records goods movement + VP only. OUT/Transfer reduces stock; IN adds. Choose “Member / Customer” to barter to someone in your list.</div>${pickerHTML('barter')}<div class="cart"><table class="lineitems"><thead><tr><th>Product</th><th>Qty</th><th class="r">—</th><th class="r">—</th><th class="r">VP</th><th></th></tr></thead><tbody id="cartbody">${cartRowsHTML('barter')}</tbody></table></div><div class="totbar"><div><div class="t">Total VP</div><div class="v" id="vptot">0 VP</div></div><span id="subtot" style="display:none"></span><button class="btn blue" onclick="saveBarter()">Save</button></div></div><div class="card" style="margin-top:16px"><h3>Recent barters / transfers</h3>${tblBarters()}</div>`;}
function barterToType(){const m=v('ba_totype')==='member';document.getElementById('ba_party').innerHTML=m?`<label>Member / Customer</label><select id="ba_cust">${S.customers.map(c=>`<option value="${c.id}">${c.name} · ${c.kind}</option>`).join('')}</select>`:`<label>Counterparty / Center</label><input id="ba_cp" placeholder="e.g. Sector-17 Center">`;}
function saveBarter(){if(!cart.length)return toast('Add a product');const dir=v('ba_dir'),date=v('ba_date');if(dir!=='IN'){const bad=cart.find(it=>qtyOf(it.productId)<it.qty);if(bad)return toast('Not enough stock for '+prod(bad.productId).name);}const toType=v('ba_totype');let cp,customerId=null;if(toType==='member'){const c=cust(v('ba_cust'));cp=c.name;customerId=c.id;}else cp=v('ba_cp');const qty=cart.reduce((a,it)=>a+it.qty,0),vp=cart.reduce((a,it)=>a+it.qty*prod(it.productId).vp,0),no=nextNo('BAR');const ltype=dir==='IN'?'BARTER_IN':(dir==='TRANSFER'?'TRANSFER':'BARTER_OUT');cart.forEach(it=>{const p=prod(it.productId);const sign=dir==='IN'?1:-1;setQty(p.id,qtyOf(p.id)+sign*it.qty);ledgerAdd(date,p.id,ltype,sign*it.qty,cp,it.qty*p.vp,no);});S.barters.push({centerId:curCenter,no,dir,toType,customerId,cp,date,items:cart.map(it=>({...it,name:prod(it.productId).name,vp:prod(it.productId).vp})),totalQty:qty,totalVp:vp});save();toast('Barter saved');viewBarter();}
function tblBarters(){const bb=cBarters();if(!bb.length)return `<div class="empty">No barters yet.</div>`;return `<table><thead><tr><th>No.</th><th>Date</th><th>Direction</th><th>To / From</th><th class="r">Qty</th><th class="r">Items</th><th class="r">VP</th></tr></thead><tbody>${bb.slice().reverse().map(b=>`<tr><td>${b.no}</td><td>${b.date}</td><td><span class="pill ${b.dir==='IN'?'ok':'partial'}">${b.dir}</span></td><td>${b.cp||'—'}${b.toType==='member'?' <span class="pill ok" style="font-size:10px">member</span>':''}</td><td class="r">${b.totalQty}</td><td class="r">${b.items.length}</td><td class="r">${vpf(b.totalVp)}</td></tr>`).join('')}</tbody></table>`;}

let lgProd=null,lgFrom='',lgTo='';
function openProdLedger(pid){lgProd=pid;lgFrom='';lgTo='';active='prodledger';render();}
function computeStockLedger(pid,from,to){const rows=S.ledger.filter(r=>r.productId===pid&&r.centerId===curCenter).slice().sort((a,b)=>(a.date+a.type).localeCompare(b.date+b.type));let opening=0;rows.forEach(r=>{if(from&&r.date<from)opening+=r.qty;});let bal=opening,totIn=0,totOut=0;const out=[];rows.forEach(r=>{if(from&&r.date<from)return;if(to&&r.date>to)return;bal+=r.qty;const isIn=r.qty>=0;if(isIn)totIn+=r.qty;else totOut+=-r.qty;out.push({date:r.date,type:r.type,party:r.party,inq:isIn?r.qty:'',outq:isIn?'':-r.qty,bal,vp:vpf(r.vp)});});return {opening,rows:out,closing:bal,totIn,totOut};}
function viewProdLedger(){const p=prod(lgProd);const L=computeStockLedger(lgProd,lgFrom,lgTo);document.getElementById('view').innerHTML=`<div class="flex" style="justify-content:space-between"><h2 class="sec">Stock Ledger — ${p.name} <span class="muted">(${curCenterObj().name})</span></h2><button class="btn ghost sm" onclick="go('catalog')">← Back</button></div><div class="card"><div class="flex" style="margin-bottom:10px"><div><label>From</label><input type="date" value="${lgFrom}" onchange="lgFrom=this.value;render()"></div><div><label>To</label><input type="date" value="${lgTo}" onchange="lgTo=this.value;render()"></div><button class="btn ghost sm" onclick="lgFrom='';lgTo='';render()">All time</button><button class="btn blue right" onclick="printProdLedger()">Print / PDF</button><button class="btn ghost" onclick="csvProdLedger()">CSV</button></div><div class="kpis" style="grid-template-columns:repeat(4,1fr)"><div class="card kpi"><div class="label">Opening</div><div class="val" style="font-size:18px">${L.opening}</div></div><div class="card kpi green"><div class="label">In</div><div class="val" style="font-size:18px">${L.totIn}</div></div><div class="card kpi bad"><div class="label">Out</div><div class="val" style="font-size:18px">${L.totOut}</div></div><div class="card kpi blue"><div class="label">Closing</div><div class="val" style="font-size:18px">${L.closing}</div></div></div><div class="tablewrap" style="margin-top:12px"><table><thead><tr><th>Date</th><th>Type</th><th>Party</th><th class="r">In</th><th class="r">Out</th><th class="r">Balance</th><th class="r">VP</th></tr></thead><tbody><tr style="font-weight:700;background:#f0fdf4"><td>${lgFrom||'—'}</td><td>Opening</td><td>—</td><td class="r"></td><td class="r"></td><td class="r">${L.opening}</td><td class="r"></td></tr>${L.rows.map(r=>`<tr><td>${r.date}</td><td>${r.type}</td><td class="muted">${r.party}</td><td class="r">${r.inq}</td><td class="r">${r.outq}</td><td class="r">${r.bal}</td><td class="r">${r.vp}</td></tr>`).join('')}</tbody><tfoot><tr><td colspan="3">Closing</td><td class="r">${L.totIn}</td><td class="r">${L.totOut}</td><td class="r">${L.closing}</td><td class="r"></td></tr></tfoot></table></div></div>`;}
function prodLedgerMatrix(){const p=prod(lgProd);const L=computeStockLedger(lgProd,lgFrom,lgTo);const head=['Date','Type','Party','In','Out','Balance','VP'];const rows=[[lgFrom||'—','Opening','—','','',L.opening,''],...L.rows.map(r=>[r.date,r.type,r.party,r.inq,r.outq,r.bal,r.vp])];const foot=['Closing','','',L.totIn,L.totOut,L.closing,''];return {title:`Stock Ledger — ${p.name} · ${curCenterObj().name}`,head,rows,foot};}
function printProdLedger(){const m=prodLedgerMatrix();printHTML(m.title,tableToHTML(m.head,m.rows,m.foot),true);}
function csvProdLedger(){const m=prodLedgerMatrix();downloadCSV('stock_ledger.csv',m.head,m.rows,m.foot);}

let clCust=null,clFrom='',clTo='';
function openCustLedger(cid){clCust=cid;clFrom='';clTo='';active='custledger';render();}
function computeCustLedger(cid,from,to){const ev=[];S.sales.filter(s=>s.customerId===cid&&s.centerId===curCenter).forEach(s=>{ev.push({date:s.date,ref:s.no,desc:`Sale (${tierLabel(s.tier)}), ${s.items.length} item(s)`,debit:s.subtotal,credit:0,vp:s.totalVp});(s.payments||[]).forEach(p=>ev.push({date:p.date,ref:s.no,desc:`Payment — ${p.mode}`,debit:0,credit:p.amount,vp:0}));});S.barters.filter(b=>b.toType==='member'&&b.customerId===cid&&b.centerId===curCenter).forEach(b=>ev.push({date:b.date,ref:b.no,desc:`Barter ${b.dir} (qty ${b.totalQty})`,debit:0,credit:0,memo:true,vp:b.totalVp}));ev.sort((a,b)=>(a.date+a.ref).localeCompare(b.date+b.ref));let opening=0;ev.forEach(e=>{if(from&&e.date<from)opening+=(e.debit-e.credit);});let bal=opening,tD=0,tC=0,tVp=0;const out=[];ev.forEach(e=>{if(from&&e.date<from)return;if(to&&e.date>to)return;if(!e.memo)bal+=(e.debit-e.credit);tD+=e.debit;tC+=e.credit;tVp+=e.vp;out.push({...e,bal:e.memo?'':bal});});return {opening,rows:out,closing:bal,tD,tC,tVp};}
function viewCustLedger(){const c=cust(clCust);const L=computeCustLedger(clCust,clFrom,clTo);document.getElementById('view').innerHTML=`<div class="flex" style="justify-content:space-between"><h2 class="sec">Customer Ledger — ${c.name} <span class="muted">(${c.kind} · ${tierLabel(c.tier)} · ${curCenterObj().name})</span></h2><button class="btn ghost sm" onclick="go('customers')">← Back</button></div><div class="card"><div class="flex" style="margin-bottom:10px"><div><label>From</label><input type="date" value="${clFrom}" onchange="clFrom=this.value;render()"></div><div><label>To</label><input type="date" value="${clTo}" onchange="clTo=this.value;render()"></div><button class="btn ghost sm" onclick="clFrom='';clTo='';render()">All time</button><button class="btn blue right" onclick="printCustLedger()">Print / PDF</button><button class="btn ghost" onclick="csvCustLedger()">CSV</button></div><div class="kpis" style="grid-template-columns:repeat(4,1fr)"><div class="card kpi blue"><div class="label">Billed</div><div class="val" style="font-size:18px">${rs(L.tD)}</div></div><div class="card kpi green"><div class="label">Paid</div><div class="val" style="font-size:18px">${rs(L.tC)}</div></div><div class="card kpi bad"><div class="label">Balance Due</div><div class="val" style="font-size:18px">${rs(L.closing)}</div></div><div class="card kpi blue"><div class="label">VP</div><div class="val" style="font-size:18px">${vpf(L.tVp)}</div></div></div><div class="tablewrap" style="margin-top:12px"><table><thead><tr><th>Date</th><th>Ref</th><th>Description</th><th class="r">Debit</th><th class="r">Credit</th><th class="r">Balance Due</th><th class="r">VP</th></tr></thead><tbody><tr style="font-weight:700;background:#f0fdf4"><td>${clFrom||'—'}</td><td>—</td><td>Opening balance</td><td class="r"></td><td class="r"></td><td class="r">${rs(L.opening)}</td><td class="r"></td></tr>${L.rows.length?L.rows.map(r=>`<tr><td>${r.date}</td><td class="muted">${r.ref}</td><td>${r.desc}</td><td class="r">${r.debit?rs(r.debit):''}</td><td class="r">${r.credit?rs(r.credit):''}</td><td class="r">${r.memo?'<span class="muted">memo</span>':rs(r.bal)}</td><td class="r">${r.vp?vpf(r.vp):''}</td></tr>`).join(''):`<tr><td colspan="7" class="empty">No activity.</td></tr>`}</tbody><tfoot><tr><td colspan="3">Totals</td><td class="r">${rs(L.tD)}</td><td class="r">${rs(L.tC)}</td><td class="r">${rs(L.closing)}</td><td class="r">${vpf(L.tVp)}</td></tr></tfoot></table></div></div>`;}
function custLedgerMatrix(){const c=cust(clCust);const L=computeCustLedger(clCust,clFrom,clTo);const head=['Date','Ref','Description','Debit','Credit','Balance Due','VP'];const rows=[[clFrom||'—','—','Opening balance','','',L.opening,''],...L.rows.map(r=>[r.date,r.ref,r.desc,r.debit||'',r.credit||'',r.memo?'memo':r.bal,r.vp||''])];const foot=['Totals','','',L.tD,L.tC,L.closing,vpf(L.tVp)];return {title:`Customer Ledger — ${c.name} · ${curCenterObj().name}`,head,rows,foot};}
function printCustLedger(){const m=custLedgerMatrix();printHTML(m.title,tableToHTML(m.head,m.rows,m.foot),true);}
function csvCustLedger(){const m=custLedgerMatrix();downloadCSV('customer_ledger.csv',m.head,m.rows,m.foot);}

const REPORTS=[['dayend','Day-End Stock'],['stock','Stock Summary'],['sales','Sales Register'],['customer','Customer-wise'],['payments','Payments Received'],['purchases','Purchase Register'],['barters','Barter / Transfer Register'],['vp','VP Report']];
let repType='dayend',repFrom='',repTo='';
function viewReports(){if(!repTo)repTo=today();document.getElementById('view').innerHTML=`<h2 class="sec">Reports <span class="muted">— ${curCenterObj().name}</span></h2><div class="card"><div class="repbtns">${REPORTS.map(([k,l])=>`<button class="${k===repType?'on':''}" onclick="repType='${k}';render()">${l}</button>`).join('')}</div><div class="flex" style="margin-bottom:6px"><div><label>${repType==='dayend'?'As on day':'From'}</label><input type="date" value="${repType==='dayend'?repTo:repFrom}" onchange="${repType==='dayend'?'repTo':'repFrom'}=this.value;render()"></div>${repType==='dayend'?'':`<div><label>To</label><input type="date" value="${repTo}" onchange="repTo=this.value;render()"></div><button class="btn ghost sm" onclick="repFrom='';render()">All time</button>`}<button class="btn blue right" onclick="printReport()">Print / PDF</button><button class="btn ghost" onclick="csvReport()">CSV</button></div><div id="repout"></div></div>`;renderReport();}
function buildReport(){const f=repFrom,t=repTo;
  if(repType==='dayend'){const day=repTo;let val=0;const rows=S.products.map(p=>{const before=S.ledger.filter(r=>r.productId===p.id&&r.centerId===curCenter&&r.date<day).reduce((a,r)=>a+r.qty,0);const onday=S.ledger.filter(r=>r.productId===p.id&&r.centerId===curCenter&&r.date===day);const inq=onday.filter(r=>r.qty>0).reduce((a,r)=>a+r.qty,0);const outq=onday.filter(r=>r.qty<0).reduce((a,r)=>a-r.qty,0);const closing=before+inq-outq;val+=closing*costOf(p.id);return [p.stockno||'—',p.name,before,inq,outq,closing,rs(closing*costOf(p.id))];}).filter(r=>r[2]||r[3]||r[4]||r[5]);return {title:`Day-End Stock — ${day} · ${curCenterObj().name}`,head:['Stock No.','Product','Opening','In','Out','Closing','Value'],rows,foot:['','Total',rows.reduce((a,r)=>a+r[2],0),rows.reduce((a,r)=>a+r[3],0),rows.reduce((a,r)=>a+r[4],0),rows.reduce((a,r)=>a+r[5],0),rs(val)]};}
  if(repType==='stock'){let val=0;const rows=S.products.map(p=>{val+=qtyOf(p.id)*costOf(p.id);return [p.stockno||'—',p.name,p.cat,qtyOf(p.id),rs(costOf(p.id)),rs(qtyOf(p.id)*costOf(p.id)),qtyOf(p.id)<=5?'LOW':''];});return {title:`Stock Summary · ${curCenterObj().name}`,head:['Stock No.','Product','Category','On hand','Cost','Value','Flag'],rows,foot:['','Total','',totalUnits(),'',rs(val),'']};}
  if(repType==='sales'){const ss=cSales().filter(s=>inRange(s.date,f,t));return {title:`Sales Register (${f||'start'} to ${t})`,head:['No.','Date','Customer','Tier','Total','Paid','Due','VP'],rows:ss.map(s=>[s.no,s.date,s.customerName,tierLabel(s.tier),rs(s.subtotal),rs(s.amountPaid),rs(s.balance),vpf(s.totalVp)]),foot:['Total','','','',rs(ss.reduce((a,s)=>a+s.subtotal,0)),rs(ss.reduce((a,s)=>a+s.amountPaid,0)),rs(ss.reduce((a,s)=>a+s.balance,0)),vpf(ss.reduce((a,s)=>a+s.totalVp,0))]};}
  if(repType==='customer'){const rows=S.customers.map(c=>{const ss=cSales().filter(s=>s.customerId===c.id&&inRange(s.date,f,t));const bb=cBarters().filter(b=>b.toType==='member'&&b.customerId===c.id&&inRange(b.date,f,t)).length;return [c.name,c.kind,tierLabel(c.tier),ss.length,bb,rs(ss.reduce((a,s)=>a+s.subtotal,0)),rs(ss.reduce((a,s)=>a+s.amountPaid,0)),rs(ss.reduce((a,s)=>a+s.balance,0)),vpf(ss.reduce((a,s)=>a+s.totalVp,0))];}).filter(r=>r[3]||r[4]);return {title:`Customer-wise (${f||'start'} to ${t})`,head:['Customer','Type','Tier','Sales','Barters','Billed','Paid','Due','VP'],rows};}
  if(repType==='payments'){const rows=[];cSales().forEach(s=>(s.payments||[]).forEach(p=>{if(inRange(p.date,f,t))rows.push([p.date,s.customerName,s.no,p.mode,rs(p.amount),p.amount]);}));rows.sort((a,b)=>b[0].localeCompare(a[0]));const tot=rows.reduce((a,r)=>a+r[5],0);return {title:`Payments Received (${f||'start'} to ${t})`,head:['Date','Customer','Sale','Mode','Amount'],rows:rows.map(r=>r.slice(0,5)),foot:['','','','Total',rs(tot)]};}
  if(repType==='purchases'){const pp=cPurchases().filter(p=>inRange(p.date,f,t));return {title:`Purchase Register (${f||'start'} to ${t})`,head:['No.','Date','Supplier','Items','VP','Cost'],rows:pp.map(p=>[p.no,p.date,p.supplier,p.items.length,vpf(p.totalVp),rs(p.subtotal)]),foot:['Total','','','',vpf(pp.reduce((a,p)=>a+p.totalVp,0)),rs(pp.reduce((a,p)=>a+p.subtotal,0))]};}
  if(repType==='barters'){const bb=cBarters().filter(b=>inRange(b.date,f,t));return {title:`Barter / Transfer Register (${f||'start'} to ${t})`,head:['No.','Date','Direction','To / From','Qty','Items','VP'],rows:bb.map(b=>[b.no,b.date,b.dir,b.cp+(b.toType==='member'?' (member)':''),b.totalQty,b.items.length,vpf(b.totalVp)]),foot:['Total','','','',bb.reduce((a,b)=>a+b.totalQty,0),'',vpf(bb.reduce((a,b)=>a+b.totalVp,0))]};}
  if(repType==='vp'){const m={};cSales().filter(s=>inRange(s.date,f,t)).forEach(s=>s.items.forEach(it=>{m[it.productId]=m[it.productId]||{name:it.name,sQ:0,sV:0};m[it.productId].sQ+=it.qty;m[it.productId].sV+=it.qty*it.vp;}));const rows=Object.values(m).map(x=>[x.name,x.sQ,vpf(x.sV)]);return {title:`VP Report — sold (${f||'start'} to ${t})`,head:['Product','Qty sold','VP sold'],rows,foot:['Total',rows.reduce((a,r)=>a+r[1],0),vpf(rows.reduce((a,r)=>a+r[2],0))]};}
}
function renderReport(){const m=buildReport();document.getElementById('repout').innerHTML=`<h3 style="margin-top:6px">${m.title}</h3>`+(m.rows.length?`<div class="tablewrap">${tableToHTML(m.head,m.rows,m.foot)}</div>`:`<div class="empty">No data for this period.</div>`);}
function printReport(){const m=buildReport();printHTML(m.title,tableToHTML(m.head,m.rows,m.foot),true);}
function csvReport(){const m=buildReport();downloadCSV(repType+'_report.csv',m.head,m.rows,m.foot);}
/* ===================== MEMBER MODULE ===================== */
let curMemberId=null;
function trialEnd(t){return addDays(t.startDate,3);}
function latestAssessment(m){return m.assessments.length?m.assessments[m.assessments.length-1]:null;}
function dueSoon(m){return m.nextCheckup&&m.nextCheckup<=addDays(today(),7);}

function viewMDash(){
  const ms=visibleMembers();const trial=ms.filter(m=>m.status==='Trial').length,act=ms.filter(m=>m.status==='Active').length;const due=ms.filter(dueSoon);
  document.getElementById('view').innerHTML=`
  <div class="kpis"><div class="card kpi green"><div class="label">Total Members</div><div class="val">${ms.length}</div></div><div class="card kpi warn"><div class="label">On Trial</div><div class="val">${trial}</div></div><div class="card kpi green"><div class="label">Active</div><div class="val">${act}</div></div><div class="card kpi bad"><div class="label">Checkup Due (≤7d)</div><div class="val">${due.length}</div></div></div>
  <div class="row"><div class="card" style="flex:1;min-width:320px"><div class="flex" style="justify-content:space-between"><h3 style="margin:0">Recent Members</h3><button class="btn sm" onclick="addMemberModal()">+ Add member</button></div><table style="margin-top:10px"><thead><tr><th>Code</th><th>Name</th><th>Status</th></tr></thead><tbody>${ms.slice(-8).reverse().map(m=>`<tr><td class="muted">${m.code}</td><td class="clik" onclick="openMember('${m.id}')">${m.name}</td><td><span class="pill ${m.status}">${m.status}</span></td></tr>`).join('')||`<tr><td colspan="3" class="empty">No members.</td></tr>`}</tbody></table></div>
    <div class="card" style="flex:1;min-width:320px"><h3>Checkup Due Soon</h3>${due.length?`<table><thead><tr><th>Member</th><th>Next checkup</th></tr></thead><tbody>${due.map(m=>`<tr><td class="clik" onclick="openMember('${m.id}')">${m.name}</td><td>${m.nextCheckup}</td></tr>`).join('')}</tbody></table>`:`<div class="empty">Nothing due in 7 days.</div>`}</div></div>`;
}

let memQ='';
function viewMembers(){
  const ms=visibleMembers().filter(m=>!memQ||(m.name+' '+m.mobile+' '+m.code+' '+(m.herbalifeId||'')).toLowerCase().includes(memQ.toLowerCase()));
  document.getElementById('view').innerHTML=`<h2 class="sec">Members <span class="muted">— ${isHO()?'all centers':curCenterObj().name}</span></h2><div class="card"><div class="flex" style="margin-bottom:10px"><div style="flex:1;min-width:220px"><label>Search (name / mobile / code / Herbalife ID)</label><input value="${memQ}" oninput="memQ=this.value;refreshMembers()"></div><button class="btn right" onclick="addMemberModal()">+ Add member</button></div><div class="tablewrap"><table><thead><tr><th>Code</th><th>Name</th><th>Mobile</th><th>Herbalife ID</th><th>Status</th>${isHO()?'<th>Center</th>':''}<th>Login</th></tr></thead><tbody id="membody">${memberRows(ms)}</tbody></table></div></div>`;
}
function memberRows(ms){return ms.length?ms.map(m=>`<tr><td class="muted">${m.code}</td><td class="clik" onclick="openMember('${m.id}')">${m.name}</td><td class="muted">${m.mobile}</td><td>${m.herbalifeId||'—'}</td><td><span class="pill ${m.status}">${m.status}</span></td>${isHO()?`<td class="muted" style="font-size:11px">${(center(m.centerId)||{}).name||''}</td>`:''}<td>${m.login?'<span class="pill ok">'+m.login.username+'</span>':'—'}</td></tr>`).join(''):`<tr><td colspan="${isHO()?7:6}" class="empty">No members found.</td></tr>`;}
function refreshMembers(){const ms=visibleMembers().filter(m=>!memQ||(m.name+' '+m.mobile+' '+m.code+' '+(m.herbalifeId||'')).toLowerCase().includes(memQ.toLowerCase()));document.getElementById('membody').innerHTML=memberRows(ms);}

function addMemberModal(){
  const opts=visibleMembers().map(m=>`<option value="${m.id}">${m.name} (${m.code})</option>`).join('');
  openModal(`<div class="flex" style="justify-content:space-between"><h3>Add member</h3><span class="x" onclick="closeModal()">×</span></div><div class="grid2" style="margin-top:8px"><div><label>Full name *</label><input id="m_name"></div><div><label>Mobile *</label><input id="m_mobile"></div><div><label>WhatsApp</label><input id="m_wa"></div><div><label>Email</label><input id="m_email"></div><div><label>Gender</label><select id="m_gender"><option></option><option>Female</option><option>Male</option><option>Other</option></select></div><div><label>Date of birth</label><input id="m_dob" type="date"></div><div><label>Height (cm)</label><input id="m_height" type="number"></div><div><label>Occupation</label><input id="m_occ"></div><div><label>Herbalife ID</label><input id="m_hlid" placeholder="optional"></div><div><label>Referral source</label><select id="m_refsrc"><option>Walk-in</option><option>Social Media</option><option>Referral</option><option>Event</option><option>Other</option></select></div><div><label>Referred by (member)</label><select id="m_refby"><option value="">— none —</option>${opts}</select></div><div><label>Status</label><select id="m_status" onchange="document.getElementById('m_trialnote').style.display=this.value==='Trial'?'block':'none'"><option value="Trial">Trial (4-day card)</option><option value="Active">Active member</option></select></div><div style="grid-column:1/-1"><label>Address</label><input id="m_addr"></div></div><div id="m_trialnote" class="tier-note">Trial card: <b>4 days</b>, fee <b>₹1,000</b>, <b>Day 1 free for anyone</b>. Convert to full member later.</div><div style="text-align:right;margin-top:6px"><button class="btn" onclick="saveMember()">Save member</button></div>`);
}
function saveMember(){const name=v('m_name').trim();if(!name)return toast('Name required');const mobile=v('m_mobile').trim();if(!mobile)return toast('Mobile required');if(S.members.some(m=>m.mobile===mobile))return toast('Mobile already exists');const status=v('m_status');const id='M'+Date.now();const code='WC-'+String(S.seq.MEM++).padStart(4,'0');S.members.push(blankMember({id,centerId:curCenter,code,herbalifeId:v('m_hlid').trim(),name,mobile,whatsapp:v('m_wa'),email:v('m_email'),gender:v('m_gender'),dob:v('m_dob'),height:+v('m_height')||null,occupation:v('m_occ'),address:v('m_addr'),referralSource:v('m_refsrc'),referredById:v('m_refby'),status,joinedAt:today(),trial:status==='Trial'?{startDate:today(),fee:1000,day1Free:true,days:[false,false,false,false],converted:false}:null}));save();closeModal();openMember(id);toast('Member added ('+code+')');}

function openMember(id){curMemberId=id;active='mdetail';render();}
function viewMemberDetail(){
  const m=member(curMemberId);if(!m){go('members');return;}
  const refby=m.referredById?member(m.referredById):null;const refCount=S.members.filter(x=>x.referredById===m.id).length;
  document.getElementById('view').innerHTML=`
  <div class="flex" style="justify-content:space-between"><h2 class="sec">${m.name} <span class="muted">${m.code}</span> <span class="pill ${m.status}">${m.status}</span></h2><div><button class="btn ghost sm" onclick="printMemberForm('${m.id}')">Print Form</button> <button class="btn ghost sm" onclick="go('members')">← Members</button></div></div>
  <div class="card"><div class="flex" style="justify-content:space-between"><h3 style="margin:0">Profile</h3><span class="muted" style="font-size:12px">${(center(m.centerId)||{}).name||''}</span></div>
   <div class="grid4" style="margin-top:10px"><div><label>Mobile</label>${m.mobile}</div><div><label>WhatsApp</label>${m.whatsapp||'—'}</div><div><label>Email</label>${m.email||'—'}</div><div><label>Herbalife ID</label>${m.herbalifeId||'—'}</div><div><label>Gender</label>${m.gender||'—'}</div><div><label>Age</label>${m.dob?age(m.dob)+' yrs':'—'}</div><div><label>Height</label>${m.height?m.height+' cm':'—'}</div><div><label>Occupation</label>${m.occupation||'—'}</div><div><label>Referral source</label>${m.referralSource||'—'}</div><div><label>Referred by</label>${refby?`<span class="clik" onclick="openMember('${refby.id}')">${refby.name}</span>`:'—'}</div><div><label>Referrals made</label>${refCount}</div><div><label>Joined</label>${m.joinedAt}</div>
     <div><label>Next check-up due</label><div class="flex" style="gap:6px"><input type="date" id="md_next" value="${m.nextCheckup||''}" style="max-width:160px"><button class="btn sm" onclick="setNextCheckup('${m.id}')">Set</button></div></div>
     <div style="grid-column:1/-1"><label>Address</label>${m.address||'—'}</div></div>
   <div style="margin-top:10px">${m.status==='Trial'?`<button class="btn" onclick="convertMember('${m.id}')">Convert trial → Active member</button> `:''}<button class="btn ghost" onclick="editMemberModal('${m.id}')">Edit profile</button> <button class="btn ghost" onclick="memberLoginModal('${m.id}')">${m.login?'Member login: '+m.login.username:'Create member login'}</button></div>
  </div>
  ${m.trial?`<div class="card" style="margin-top:14px"><h3>Trial Card</h3><div class="grid4"><div><label>Start</label>${m.trial.startDate}</div><div><label>End (4 days)</label>${trialEnd(m.trial)}</div><div><label>Fee</label>${rs(m.trial.fee)}</div><div><label>Day 1</label>FREE for anyone</div></div><div style="margin-top:10px"><label>Attendance (tick each day)</label>${m.trial.days.map((d,i)=>`<label class="chk"><input type="checkbox" ${d?'checked':''} onchange="toggleTrialDay('${m.id}',${i})"> Day ${i+1}${i===0?' (free)':''}</label>`).join('')}</div>${m.trial.converted?'<p class="muted" style="margin-top:8px">Converted to member.</p>':''}</div>`:''}
  <div class="card" style="margin-top:14px"><div class="flex" style="justify-content:space-between"><h3 style="margin:0">Attendance</h3><button class="btn sm" onclick="markAttend('${m.id}')">Mark present today</button></div>${m.attendance.length?`<div style="margin-top:8px">${m.attendance.slice().reverse().slice(0,30).map(a=>`<span class="chip">${a.date}</span>`).join('')}</div><p class="muted" style="font-size:12px;margin-top:6px">${m.attendance.length} visit(s) recorded.</p>`:'<div class="empty">No attendance yet.</div>'}</div>
  <div class="card" style="margin-top:14px"><div class="flex" style="justify-content:space-between"><h3 style="margin:0">Parameters &amp; Illness</h3><div><button class="btn ghost sm" onclick="printMemberForm('${m.id}')">Print Form (AWC)</button> <button class="btn ghost sm" onclick="illnessModal('${m.id}')">Edit illness</button> <button class="btn sm" onclick="assessmentModal('${m.id}')">+ Add reading</button></div></div><div style="margin:8px 0">${m.illnesses.length||m.illnessOther?[...m.illnesses,...(m.illnessOther?['Other: '+m.illnessOther]:[])].map(i=>`<span class="chip">${i}</span>`).join(''):'<span class="muted">No conditions recorded</span>'}</div>${m.assessments.length?`<div class="tablewrap"><table><thead><tr><th>Date</th><th class="r">Weight</th><th class="r">BMI</th><th class="r">Fat %</th><th class="r">Muscle %</th><th class="r">Visceral</th><th>Diet</th></tr></thead><tbody>${m.assessments.slice().reverse().map(a=>`<tr><td>${a.date}</td><td class="r">${a.weight}</td><td class="r">${a.bmi}</td><td class="r">${a.fatPct||'—'}</td><td class="r">${a.muscle||'—'}</td><td class="r">${a.visceral||'—'}</td><td>${a.diet||'—'}</td></tr>`).join('')}</tbody></table></div>`:'<div class="empty">No readings yet.</div>'}</div>
  <div class="card" style="margin-top:14px"><div class="flex" style="justify-content:space-between"><h3 style="margin:0">Family Members</h3><button class="btn sm" onclick="familyModal('${m.id}')">+ Add family</button></div>${m.family.length?`<table style="margin-top:8px"><thead><tr><th>Name</th><th>Relation</th><th>Mobile</th><th class="r">Age</th></tr></thead><tbody>${m.family.map(f=>`<tr><td>${f.name}</td><td>${f.relation}</td><td class="muted">${f.mobile||'—'}</td><td class="r">${f.age||'—'}</td></tr>`).join('')}</tbody></table>`:'<div class="empty">No family members.</div>'}</div>
  <div class="card" style="margin-top:14px"><div class="flex" style="justify-content:space-between"><h3 style="margin:0">Recommendations</h3><button class="btn sm" onclick="recoModal('${m.id}')">+ New recommendation</button></div>${m.recommendations.length?`<table style="margin-top:8px"><thead><tr><th>Date</th><th>Next checkup</th><th>Card days</th><th class="r"></th></tr></thead><tbody>${m.recommendations.map((r,i)=>`<tr><td>${r.date}</td><td>${r.nextCheckup||'—'}</td><td>${r.cardDays||'—'}</td><td class="r"><button class="btn sm blue" onclick="printPrescription('${m.id}',${i})">Print prescription</button></td></tr>`).join('')}</tbody></table>`:'<div class="empty">No recommendations yet.</div>'}</div>`;
}
VIEWS.mdetail=viewMemberDetail;
function setNextCheckup(id){const m=member(id);m.nextCheckup=v('md_next');save();render();toast('Next check-up set');}
function convertMember(id){const m=member(id);m.status='Active';if(m.trial)m.trial.converted=true;save();render();toast('Converted to Active');}
function toggleTrialDay(id,i){const m=member(id);m.trial.days[i]=!m.trial.days[i];save();render();}
function markAttend(id){const m=member(id);const d=today();if(m.attendance.some(a=>a.date===d))return toast('Already marked today');m.attendance.push({date:d});save();render();toast('Attendance marked');}
function memberLoginModal(id){const m=member(id);const ex=m.login;openModal(`<div class="flex" style="justify-content:space-between"><h3>Member login — ${m.name}</h3><span class="x" onclick="closeModal()">×</span></div><p class="muted" style="font-size:12px;margin:6px 0">The member can log in to a read-only portal to view their profile, attendance, parameters, recommendations and ledger.</p><div class="grid2"><div><label>Username</label><input id="ml_u" value="${ex?ex.username:(m.mobile||'')}"></div><div><label>Password</label><input id="ml_p" value="${ex?ex.password:''}"></div></div><div style="text-align:right;margin-top:12px"><button class="btn" onclick="saveMemberLogin('${id}')">${ex?'Update':'Create'} login</button></div>`);}
function saveMemberLogin(id){const m=member(id);const u=v('ml_u').trim(),p=v('ml_p').trim();if(!u||!p)return toast('Enter username & password');if(S.users.some(x=>x.username===u&&!(x.role==='member'&&x.memberId===id)))return toast('Username taken');let ex=S.users.find(x=>x.role==='member'&&x.memberId===id);if(ex){ex.username=u;ex.password=p;}else S.users.push({username:u,password:p,role:'member',memberId:id});m.login={username:u,password:p};save();closeModal();render();toast('Member login saved');}

function editMemberModal(id){const m=member(id);openModal(`<div class="flex" style="justify-content:space-between"><h3>Edit profile — ${m.name}</h3><span class="x" onclick="closeModal()">×</span></div><div class="grid2" style="margin-top:8px"><div><label>Name</label><input id="e_name" value="${m.name}"></div><div><label>Mobile</label><input id="e_mobile" value="${m.mobile}"></div><div><label>WhatsApp</label><input id="e_wa" value="${m.whatsapp||''}"></div><div><label>Email</label><input id="e_email" value="${m.email||''}"></div><div><label>Herbalife ID</label><input id="e_hlid" value="${m.herbalifeId||''}"></div><div><label>Height (cm)</label><input id="e_h" type="number" value="${m.height||''}"></div><div><label>Occupation</label><input id="e_occ" value="${m.occupation||''}"></div><div><label>Status</label><select id="e_status"><option ${m.status==='Trial'?'selected':''}>Trial</option><option ${m.status==='Active'?'selected':''}>Active</option><option ${m.status==='Inactive'?'selected':''}>Inactive</option></select></div><div style="grid-column:1/-1"><label>Address</label><input id="e_addr" value="${m.address||''}"></div></div><div style="text-align:right;margin-top:10px"><button class="btn" onclick="saveEditMember('${id}')">Save</button></div>`);}
function saveEditMember(id){const m=member(id);m.name=v('e_name');m.mobile=v('e_mobile');m.whatsapp=v('e_wa');m.email=v('e_email');m.herbalifeId=v('e_hlid');m.height=+v('e_h')||null;m.occupation=v('e_occ');m.status=v('e_status');m.address=v('e_addr');save();closeModal();render();toast('Saved');}
function illnessModal(id){const m=member(id);openModal(`<div class="flex" style="justify-content:space-between"><h3>Illness / conditions — ${m.name}</h3><span class="x" onclick="closeModal()">×</span></div><div style="margin-top:8px">${ILLNESSES.map(i=>`<label class="chk"><input type="checkbox" class="ill" value="${i}" ${m.illnesses.includes(i)?'checked':''}> ${i}</label>`).join('')}</div><div style="margin-top:10px"><label>Other / Special notes</label><input id="ill_other" value="${m.illnessOther||''}"></div><div style="text-align:right;margin-top:10px"><button class="btn" onclick="saveIllness('${id}')">Save</button></div>`);}
function saveIllness(id){const m=member(id);m.illnesses=[...document.querySelectorAll('.ill:checked')].map(e=>e.value);m.illnessOther=v('ill_other');save();closeModal();render();toast('Updated');}
function assessmentModal(id){const m=member(id);openModal(`<div class="flex" style="justify-content:space-between"><h3>Add reading — ${m.name}</h3><span class="x" onclick="closeModal()">×</span></div><div class="grid3" style="margin-top:8px"><div><label>Date</label><input id="a_date" type="date" value="${today()}"></div><div><label>Weight (kg)</label><input id="a_w" type="number"></div><div><label>Height (cm)</label><input id="a_h" type="number" value="${m.height||''}"></div><div><label>Fat %</label><input id="a_fat" type="number"></div><div><label>Visceral fat</label><input id="a_vis" type="number"></div><div><label>Muscle %</label><input id="a_mus" type="number"></div><div><label>Resting metabolism</label><input id="a_rm" type="number"></div><div><label>Body age</label><input id="a_ba" type="number"></div><div><label>Subcutaneous %</label><input id="a_sub" type="number"></div><div><label>Water (glasses/day)</label><input id="a_water" type="number"></div><div><label>Tea/Coffee (cups/day)</label><input id="a_tc" type="number"></div><div><label>Diet</label><select id="a_diet"><option>Veg</option><option>Non-Veg</option></select></div></div><p class="muted" style="font-size:12px;margin-top:6px">BMI auto-calculated from weight + height.</p><div style="text-align:right;margin-top:8px"><button class="btn" onclick="saveAssessment('${id}')">Save reading</button></div>`);}
function saveAssessment(id){const m=member(id);const w=+v('a_w')||0,h=+v('a_h')||m.height||0;const bmi=h?Math.round(w/((h/100)**2)*10)/10:0;m.assessments.push({date:v('a_date'),weight:w,height:h,bmi,fatPct:+v('a_fat')||null,visceral:+v('a_vis')||null,muscle:+v('a_mus')||null,restingMet:+v('a_rm')||null,bodyAge:+v('a_ba')||null,subcut:+v('a_sub')||null,water:+v('a_water')||null,teaCoffee:+v('a_tc')||null,diet:v('a_diet')});if(h)m.height=h;save();closeModal();render();toast('Reading saved · BMI '+bmi);}
function familyModal(id){openModal(`<div class="flex" style="justify-content:space-between"><h3>Add family member</h3><span class="x" onclick="closeModal()">×</span></div><div class="grid2" style="margin-top:8px"><div><label>Name</label><input id="f_name"></div><div><label>Relation</label><select id="f_rel"><option>Spouse</option><option>Child</option><option>Parent</option><option>Other</option></select></div><div><label>Mobile</label><input id="f_mobile"></div><div><label>Age</label><input id="f_age" type="number"></div></div><div style="text-align:right;margin-top:10px"><button class="btn" onclick="saveFamily('${id}')">Add</button></div>`);}
function saveFamily(id){const m=member(id);const n=v('f_name').trim();if(!n)return toast('Name required');m.family.push({name:n,relation:v('f_rel'),mobile:v('f_mobile'),age:+v('f_age')||null});save();closeModal();render();toast('Family added');}
function recoModal(id){const m=member(id);openModal(`<div class="flex" style="justify-content:space-between"><h3>New recommendation — ${m.name}</h3><span class="x" onclick="closeModal()">×</span></div><div class="grid3" style="margin-top:8px"><div><label>Date</label><input id="r_date" type="date" value="${today()}"></div><div><label>Next checkup due</label><input id="r_next" type="date" value="${addDays(today(),30)}"></div><div><label>Recommended card days (optional)</label><input id="r_card" type="number" placeholder="e.g. 30"></div><div><label>Water (glasses/day)</label><input id="r_water" type="number" value="8"></div></div><div style="margin-top:10px"><label>Recommendation / diet plan</label><textarea id="r_plan" rows="6" placeholder="7 AM — Breakfast: 2 scoops Formula 1 shake + Afresh&#10;11 AM — Snack: Protein bar&#10;1 PM — Lunch: normal + Cell-U-Loss&#10;5 PM — Snack: Aloe + tea&#10;8 PM — Dinner: light"></textarea></div><div style="margin-top:10px"><label>Special instructions</label><input id="r_special" placeholder="e.g. 1 litre water per 20kg body weight"></div><div style="text-align:right;margin-top:10px"><button class="btn" onclick="saveReco('${id}')">Save recommendation</button></div>`);}
function saveReco(id){const m=member(id);const nx=v('r_next');m.recommendations.push({date:v('r_date'),nextCheckup:nx,cardDays:+v('r_card')||null,water:+v('r_water')||null,plan:v('r_plan'),special:v('r_special')});if(nx)m.nextCheckup=nx;save();closeModal();render();toast('Recommendation saved');}

/* ---- AWC printable Form + Prescription (with logo) ---- */
function condBoxes(m){return ILLNESSES.map(i=>`<span style="display:inline-block;margin:2px 10px 2px 0">${m.illnesses.includes(i)?'☑':'☐'} ${i}</span>`).join('');}
function bodyCompRows(m){const rows=m.assessments.length?m.assessments:[{}];return rows.map(a=>`<tr><td>${a.date||''}</td><td>${a.weight||''}</td><td>${a.fatPct||''}</td><td>${a.visceral||''}</td><td>${a.restingMet||''}</td><td>${a.bmi||''}</td><td>${a.bodyAge||''}</td><td>${a.subcut||''}</td><td>${a.muscle||''}</td></tr>`).join('')+(m.assessments.length<3?Array(3-m.assessments.length).fill('<tr><td>&nbsp;</td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>').join(''):'');}
function printMemberForm(id){const m=member(id);const refby=m.referredById&&member(m.referredById)?member(m.referredById).name:'';const la=latestAssessment(m)||{};
  const inner=`
  <fieldset><legend>Client Details</legend><div class="gline"><div><b>Sr. No.:</b> ${m.code}</div><div><b>Date:</b> ${today()}</div><div><b>Name:</b> ${m.name}</div><div><b>Ref. By:</b> ${refby||'—'}</div></div><div class="gline" style="margin-top:6px"><div><b>Address:</b> ${m.address||'—'}</div></div><div class="gline" style="margin-top:6px"><div><b>Contact No.:</b> ${m.mobile}</div><div><b>Height:</b> ${m.height||'—'} cm</div><div><b>Age:</b> ${m.dob?age(m.dob):'—'}</div><div><b>Herbalife ID:</b> ${m.herbalifeId||'—'}</div></div></fieldset>
  <fieldset><legend>Body Composition Tracker</legend><p style="font-size:11px;color:#555;margin:0 0 6px">Subcutaneous Fat% – 19% Max | Muscle% – Male 33–36%, Female 30–33%</p><table><thead><tr><th>Date</th><th>Weight (Kg.)</th><th>Fat %</th><th>Visceral (4–6)</th><th>Resting Metab.</th><th>B.M.I.</th><th>Body Age</th><th>Subcut. Fat %</th><th>Muscle %</th></tr></thead><tbody>${bodyCompRows(m)}</tbody></table></fieldset>
  <fieldset><legend>Daily Diet Chart</legend><div class="gline"><div><b>Tea/Coffee (cups/day):</b> ${la.teaCoffee||'____'}</div><div><b>Water (glasses/day):</b> ${la.water||'____'}</div><div><b>Diet Type:</b> ${la.diet||'____'}</div></div><div style="margin-top:8px"><b>Existing Health Conditions:</b><br>${condBoxes(m)}</div><div style="margin-top:6px"><b>Others:</b> ${m.illnessOther||'—'}</div></fieldset>
  <fieldset><legend>Recommendation</legend><p style="font-size:11px;color:#555;margin:0 0 6px">2 Spoon A Fresh — to be taken as advised.</p><table><thead><tr><th></th><th>7 A.M.</th><th>11 A.M.</th><th>5 P.M.</th></tr></thead><tbody>${['Breakfast','Healthy Snacks','Lunch','Healthy Snacks','Dinner'].map(r=>`<tr><td style="text-align:left;font-weight:600;background:#f7faf7">${r}</td><td>&nbsp;</td><td></td><td></td></tr>`).join('')}</tbody></table><div class="gline" style="margin-top:8px"><div><b>Recommended Glasses of Water/Day:</b> ____</div></div><p style="font-size:11px;color:#555;margin-top:8px"><b>Note:</b> Recommended Water Consumption is 1 Litre for Every 20 kg of Body Weight. May vary person to person.</p></fieldset>
  <p class="disc">Disclaimer: Results are individual and may vary from person to person. This form is for wellness tracking purposes only and does not replace professional medical advice.</p>`;
  printHTML('Diet Chart & Wellness Form',inner,true);
}
function printPrescription(id,i){const m=member(id);const r=m.recommendations[i];if(!r)return toast('No recommendation to print');const la=latestAssessment(m);
  const inner=`<div class="box"><div class="gline"><div><b>Name:</b> ${m.name}</div><div><b>Code:</b> ${m.code}</div><div><b>Herbalife ID:</b> ${m.herbalifeId||'—'}</div><div><b>Date:</b> ${r.date}</div></div><div class="gline" style="margin-top:6px"><div><b>Age:</b> ${m.dob?age(m.dob)+' yrs':'—'}</div><div><b>Height:</b> ${m.height||'—'} cm</div><div><b>Contact:</b> ${m.mobile}</div><div><b>Ref by:</b> ${m.referredById&&member(m.referredById)?member(m.referredById).name:'—'}</div></div></div>
  ${la?`<div class="box"><b>Latest body composition (${la.date}):</b> Weight ${la.weight} kg · BMI ${la.bmi} · Fat ${la.fatPct||'—'}% · Muscle ${la.muscle||'—'}% · Visceral ${la.visceral||'—'}</div>`:''}
  ${m.illnesses.length||m.illnessOther?`<div class="box"><b>Health conditions:</b> ${[...m.illnesses,...(m.illnessOther?['Other: '+m.illnessOther]:[])].join(', ')}</div>`:''}
  <div class="box"><b>Recommendation / Diet Plan:</b><br>${(r.plan||'').replace(/\n/g,'<br>')||'—'}</div>
  <div class="box"><b>Water:</b> ${r.water||'—'} glasses/day. ${r.special?'<br><b>Special:</b> '+r.special:''}</div>
  <div class="box"><b>Next check-up due:</b> ${r.nextCheckup||'—'} ${r.cardDays?' &nbsp; <b>Recommended card:</b> '+r.cardDays+' days':''}</div>
  <p class="disc">Results are individual and may vary from person to person. This is a wellness recommendation, not a medical prescription.</p>`;
  printHTML('Wellness Recommendation — '+m.name,inner,true);
}

/* ---- Attendance tab (daily marking) ---- */
let attDate='';
function viewAttendance(){if(!attDate)attDate=today();const ms=visibleMembers();
  document.getElementById('view').innerHTML=`<h2 class="sec">Attendance <span class="muted">— ${isHO()?'all centers':curCenterObj().name}</span></h2>

  ['admin','admin','head','',''],
  ['owner17','owner','owner','CT1',''],
  ['coach17','coach','coach','CT1',''],
  ['reception17','reception','reception','CT1',''],

  ['attendance17','attendance','attendance','CT1',''],

function upsertDemoUser(username,password,userRole,centerId,memberId,reset){
  S.users=S.users||[];
  let u=S.users.find(x=>x.username===username);
  if(!u){S.users.push({username,password,role:userRole,centerId,memberId,active:true});return;}
  u.role=userRole;u.centerId=centerId||u.centerId;u.memberId=memberId||u.memberId;u.active=true;
  if(reset)u.password=password;
}
function ensureDemoLogins(reset=false){
  DEMO_LOGINS.forEach(([username,password,userRole,centerId,memberId])=>upsertDemoUser(username,password,userRole,centerId,memberId,reset));
  const m=(S.members||[])[0];
  if(m){
    const username=m.login?.username||m.mobile||'member1',password=reset?'member':(m.login?.password||'member');
    m.login={username,password};
    upsertDemoUser(username,password,'member',m.centerId,m.id,reset);
  }
}
function restoreDemoLogins(){ensureDemoLogins(true);save();render();toast('Demo logins restored');}
function centerPrefix(cid){const c=center(cid)||{};const m=(c.name||'C').match(/Sector\s*(\d+)/i);return m?'S'+m[1]:'C'+String((S.centers||[]).findIndex(x=>x.id===cid)+1).padStart(2,'0');}
function nextMemberCode(cid){const prefix=centerPrefix(cid);const max=(S.members||[]).filter(m=>m.centerId===cid&&String(m.code||'').startsWith(prefix+'-')).reduce((a,m)=>Math.max(a,+String(m.code).split('-')[1]||0),0);return prefix+'-'+String(max+1).padStart(4,'0');}
function ensureV6(){
  S.version='v6';
  S.permissions=S.permissions||{};
  Object.keys(ROLE_MODULES).forEach(r=>S.permissions[r]=S.permissions[r]||{modules:[...ROLE_MODULES[r]],actions:['view','create','edit','print','notify']});
  S.accessAudit=S.accessAudit||[];
  S.notifications=S.notifications||[];
  S.notificationSettings=S.notificationSettings||{barter7:true,checkup:true,absence:true,payment:true,lowStock:true,trial:true,birthday:true,diet:true,counselling:true};
  S.dietAdvice=S.dietAdvice||[];
  S.kitchen=S.kitchen||[];
  S.counselling=S.counselling||[];
  S.cards=S.cards||[];
  S.seq=S.seq||{MEM:3,SAL:1,PUR:1,BAR:1};
  S.users=S.users||[];
  ensureDemoLogins(false);
  const addUser=(username,password,role,centerId,memberId)=>{if(!S.users.some(u=>u.username===username))S.users.push({username,password,role,centerId,memberId,active:true});};
  addUser('owner17','owner', 'owner','CT1');addUser('coach17','coach','coach','CT1');addUser('reception17','reception','reception','CT1');
  addUser('kitchen17','kitchen','kitchen','CT1');addUser('attendance17','attendance','attendance','CT1');addUser('forms17','forms','formentry','CT1');
  (S.members||[]).forEach((m,i)=>{
    if(!m.code||m.code.startsWith('WC-'))m.code=centerPrefix(m.centerId)+'-'+String(i+1).padStart(4,'0');
    if(!Object.prototype.hasOwnProperty.call(m,'assignedCoachId'))m.assignedCoachId='';
    m.bloodReports=m.bloodReports||[];m.family=m.family||[];
    m.family.forEach(f=>{f.dob=f.dob||'';});
    m.dietAdviceIds=m.dietAdviceIds||[];m.counsellingIds=m.counsellingIds||[];
    if(!m.login&&i===0){m.login={username:m.mobile||'member1',password:'member'};addUser(m.login.username,m.login.password,'member',m.centerId,m.id);}
    if(!m.bloodReports.length&&i===0)m.bloodReports.push({id:'BR1',date:'2026-06-10',hba1c:'5.6',fastingSugar:'92',ppSugar:'126',cholesterol:'178',hdl:'48',ldl:'102',thyroid:'Normal',vitaminD:'31',b12:'420',custom:[{name:'Hemoglobin',value:'13.1'}]});
  });
  if(!S.dietAdvice.length&&S.members&&S.members[0]){
    const m=S.members[0];S.dietAdvice.push({id:'DA1',memberId:m.id,centerId:m.centerId,date:today(),givenBy:'coach17',dietRecommended:'Formula 1 shake morning and evening, normal lunch, light dinner.',timingRecommended:'7 AM shake, 11 AM snack, 5 PM Afresh, 8 PM dinner.',effectiveFrom:today(),notes:'Increase water intake.',active:true});
    m.dietAdviceIds=['DA1'];m.nextCheckup=m.nextCheckup||addDays(today(),7);
  }
  if(!S.counselling.length&&S.members&&S.members[0])S.counselling.push({id:'CO1',memberId:S.members[0].id,centerId:S.members[0].centerId,date:today(),counsellor:'coach17',reason:'Weight management follow-up',goals:'Improve consistency',challenges:'Evening snacking',notes:'Review after one week.',nextFollowUp:addDays(today(),7),status:'scheduled'});
}

function productTax(p,unit){const gst=p.gst??GST_DEFAULT;const taxable=unit/(1+gst/100);return {gst,taxable,gstAmt:unit-taxable,mrp:p.mrp||unit};}

function saveTxnEdit(type,no){const list=type==='sale'?S.sales:type==='purchase'?S.purchases:S.barters;const x=list.find(t=>t.no===no);const old=x.items.map(it=>({...it}));x.date=v('tx_date');if(type==='sale')x.customerName=v('tx_party');else if(type==='purchase')x.supplier=v('tx_party');else x.cp=v('tx_party');x.items=x.items.map((it,i)=>enrichItem({...it,qty:+v('tx_q_'+i)||it.qty,unitPrice:+v('tx_r_'+i)||it.unitPrice},x.tier));x.subtotal=x.items.reduce((a,it)=>a+it.qty*it.unitPrice,0);x.totalVp=x.items.reduce((a,it)=>a+it.qty*(it.vp||0),0);if(type==='sale'){x.balance=Math.max(0,x.subtotal-(x.amountPaid||0));}const stockSign=type==='sale'?-1:type==='purchase'?1:(x.dir==='IN'?1:-1);old.forEach((it,i)=>{const ni=x.items[i],diff=(ni.qty-it.qty)*stockSign;if(diff){setQty(it.productId,qtyOf(it.productId)+diff);ledgerAdd(today(),it.productId,'EDIT_'+type.toUpperCase(),diff,'Edit '+no,(ni.vp||0)*Math.abs(diff),no+'-EDIT');}});save();closeModal();render();toast(no+' edited');}

function barterDirectionChanged(){const dir=v('ba_dir'),type=document.getElementById('ba_totype'),box=document.getElementById('ba_party');if(dir==='TRANSFER'){type.disabled=true;box.innerHTML=`<label>Destination center</label><select id="ba_dest">${S.centers.filter(c=>c.id!==curCenter).map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select>`;}else{type.disabled=false;barterToType();}}
function relevantBarters(){return S.barters.filter(b=>b.centerId===curCenter||b.destinationCenterId===curCenter||role==='head');}
function transferAction(b){
  if(b.dir!=='TRANSFER'){
    const canClose=!['closed','cancelled'].includes(b.status||'');
    return `<button class="btn sm ghost" onclick="openTxn('barter','${b.no}')">View</button> ${canClose?`<button class="btn sm" onclick="closeBarterModal('${b.no}')">Close</button>`:`<span class="pill ok">${b.status||'closed'}</span>`}`;
  }
  if(b.status==='dispatched'){
    const receive=b.destinationCenterId===curCenter||role==='head',cancel=b.centerId===curCenter||role==='head';
    return `${receive?`<button class="btn sm" onclick="receiveTransfer('${b.no}')">Receive</button> `:''}${cancel?`<button class="btn sm bad" onclick="cancelTransfer('${b.no}')">Cancel</button>`:''}`||'<span class="pill partial">dispatched</span>';
  }
  return `<span class="pill ${b.status==='received'?'ok':'partial'}">${b.status||'dispatched'}</span>`;

function closeBarterModal(no){const b=S.barters.find(x=>x.no===no);if(!b)return toast('Barter not found');openModal(`<div class="flex" style="justify-content:space-between"><h3>Close Barter ${no}</h3><span class="x" onclick="closeModal()">×</span></div><p class="muted" style="margin:8px 0">Close this barter with cash, UPI, bank transfer, other payment, or inventory received note.</p><div class="grid2"><div><label>Close mode</label><select id="bc_mode"><option>Cash</option><option>UPI</option><option>Bank Transfer</option><option>Inventory Received</option><option>Other</option></select></div><div><label>Amount / value</label><input id="bc_amt" type="number" value="0"></div></div><div style="margin-top:8px"><label>Closing note</label><textarea id="bc_note" rows="3"></textarea></div><div style="text-align:right;margin-top:12px"><button class="btn" onclick="saveBarterClose('${no}')">Close barter</button></div>`);}

viewBarter=function(){cart=[];const rows=relevantBarters().slice().reverse();document.getElementById('view').innerHTML=`<div class="page-head"><div><h2>Barter & Center Transfers</h2><p>Center transfers use dispatch and receipt confirmation; destination stock changes only when received.</p></div></div><div class="card"><div class="grid3"><div><label>Movement type</label><select id="ba_dir" onchange="barterDirectionChanged()"><option value="OUT">Barter OUT</option><option value="IN">Barter IN</option><option value="TRANSFER">Transfer to center</option></select></div><div><label>Party type</label><select id="ba_totype" onchange="barterToType()"><option value="external">External / Center</option><option value="member">Member / Customer</option></select></div><div><label>Date</label><input id="ba_date" type="date" value="${today()}"></div></div><div id="ba_party" style="margin-top:8px"><label>Counterparty</label><input id="ba_cp"></div>${pickerHTML('barter')}<div class="cart"><table class="lineitems"><thead><tr><th>Product</th><th>Qty</th><th></th><th></th><th>VP</th><th></th></tr></thead><tbody id="cartbody">${cartRowsHTML('barter')}</tbody></table></div><div class="totbar"><div><div class="t">Total VP</div><div class="v" id="vptot">0 VP</div></div><span id="subtot" style="display:none"></span><button class="btn" onclick="saveBarter()">Save movement</button></div></div><div class="card" style="margin-top:14px"><h3>Movement tracking</h3><div class="tablewrap">${tableToHTML(['No.','Date','Type','Source','Destination / Party','Items','Status','Action'],rows.map(b=>[b.no,b.date,b.dir,(center(b.centerId)||{}).name||'',b.destinationCenterId?(center(b.destinationCenterId)||{}).name:b.cp,(b.items||[]).map(i=>i.name+' x'+i.qty).join(', '),(b.status||'recorded')+(b.closingMode?' - '+b.closingMode:''),transferAction(b)]))}</div></div>`;};
saveBarter=function(){if(!cart.length)return toast('Add a product');const dir=v('ba_dir'),date=v('ba_date'),bad=dir!=='IN'&&cart.find(it=>qtyOf(it.productId)<it.qty);if(bad)return toast('Not enough stock for '+prod(bad.productId).name);const items=cart.map(it=>enrichItem(it,'mrp')),qty=items.reduce((a,it)=>a+it.qty,0),vp=items.reduce((a,it)=>a+it.qty*it.vp,0),no=nextNo('BAR');if(dir==='TRANSFER'){const dest=v('ba_dest');if(!dest||dest===curCenter)return toast('Choose another destination center');items.forEach(it=>{setQty(it.productId,qtyOf(it.productId)-it.qty);ledgerAdd(date,it.productId,'TRANSFER_OUT',-it.qty,(center(dest)||{}).name,it.qty*it.vp,no);});S.barters.push({centerId:curCenter,sourceCenterId:curCenter,destinationCenterId:dest,no,dir,date,items,totalQty:qty,totalVp:vp,status:'dispatched',dispatchedBy:curUser.username,dispatchedAt:new Date().toISOString()});queueNotification('barter7','Transfer '+no+' dispatched to '+(center(dest)||{}).name,(ownerOf(dest)||'owner'));}else{const toType=v('ba_totype');let cp='',customerId=null;if(toType==='member'){const c=cust(v('ba_cust'));cp=c.name;customerId=c.id;}else cp=v('ba_cp');const sign=dir==='IN'?1:-1;items.forEach(it=>{setQty(it.productId,qtyOf(it.productId)+sign*it.qty);ledgerAdd(date,it.productId,dir==='IN'?'BARTER_IN':'BARTER_OUT',sign*it.qty,cp,it.qty*it.vp,no);});S.barters.push({centerId:curCenter,no,dir,toType,customerId,cp,date,items,totalQty:qty,totalVp:vp,status:'recorded',followUpDate:addDays(date,7)});}save();toast(dir==='TRANSFER'?'Transfer dispatched - destination must receive':'Barter saved');viewBarter();};
function receiveTransfer(no){const b=S.barters.find(x=>x.no===no);if(!b||b.status!=='dispatched')return;ensureStock(b.destinationCenterId);b.items.forEach(it=>{S.stock[b.destinationCenterId][it.productId].qty+=it.qty;S.ledger.push({centerId:b.destinationCenterId,date:today(),productId:it.productId,type:'TRANSFER_IN',qty:it.qty,party:(center(b.centerId)||{}).name,vp:it.qty*it.vp,ref:no});});b.status='received';b.receivedBy=curUser.username;b.receivedAt=new Date().toISOString();save();render();toast(no+' received into destination stock');}
function cancelTransfer(no){const b=S.barters.find(x=>x.no===no);if(!b||b.status!=='dispatched')return;ensureStock(b.centerId);b.items.forEach(it=>{S.stock[b.centerId][it.productId].qty+=it.qty;S.ledger.push({centerId:b.centerId,date:today(),productId:it.productId,type:'TRANSFER_CANCELLED',qty:it.qty,party:(center(b.destinationCenterId)||{}).name,vp:it.qty*it.vp,ref:no+'-CANCEL'});});b.status='cancelled';b.cancelledBy=curUser.username;save();render();toast(no+' cancelled and source stock restored');}

esent</button>`}${pending?'<span class="pill partial">Checkup pending</span>':`<button class="btn sm ${cs.due?'warn':'ghost'}" onclick="requestHealthForm('${m.id}')">Send for checkup</button>`}${hasModule('healthforms')?`<button class="btn sm ghost" onclick="openHealthForm('${m.id}','')">Fill form</button>`:''}</div></div>`;}).join('')||'<div class="empty">No member found.</div>'}</div></div>`;};

/* Safer credential and access control */
function canManageCredential(u){if(!u)return false;if(role==='head')return true;if(role==='owner')return u.role!=='head' && userCenterId(u)===curCenter;return false;}

resetPasswordModal=function(username){const u=S.users.find(x=>x.username===username);if(!u)return toast('User not found');if(!canManageCredential(u))return toast('You can reset only users linked to your center');openModal(`<div class="flex" style="justify-content:space-between"><h3>Reset password - ${username}</h3><span class="x" onclick="closeModal()">×</span></div><p class="muted" style="margin:8px 0">Center owners can reset only users linked to their own center. Head Office can reset all.</p><div class="grid2"><div><label>New password</label><input id="rp_new" type="password"></div><div><label>Confirm password</label><input id="rp_confirm" type="password"></div></div><div style="text-align:right;margin-top:12px"><button class="btn" onclick="resetUserPassword('${username}')">Reset password</button></div>`);};
resetUserPassword=function(username){const u=S.users.find(x=>x.username===username);if(!canManageCredential(u))return toast('Not allowed for this user');const p=v('rp_new'),c=v('rp_confirm');if(!p||p.length<4)return toast('Use at least 4 characters');if(p!==c)return toast('Passwords do not match');u.password=p;u.passwordResetAt=new Date().toISOString();u.passwordResetBy=curUser.username;S.accessAudit=S.accessAudit||[];S.accessAudit.push({date:today(),by:curUser.username,action:'Password reset for '+username});save();closeModal();render();toast('Password reset for '+username);};
viewCredentials=function(){const us=centerDirectoryUsers();document.getElementById('view').innerHTML=`<div class="page-head"><div><h2>Center Login Directory</h2><p>${curCenterObj().name} user IDs, roles, status and secure password reset.</p></div></div><div class="tier-note"><b>Security rule:</b> Center Owner can reset only users attached to this center. Head Office manages all centers.</div><div class="card"><div class="tablewrap"><table><thead><tr><th>User ID</th><th>Role</th><th>Center / Linked person</th><th>Active</th><th>Last login</th><th>Password</th></tr></thead><tbody>${us.map(u=>`<tr><td><b>${u.username}</b></td><td>${ERP_ROLES[u.role]||u.role}</td><td>${u.memberId?(member(u.memberId)||{}).name||'—':centerLabel(userCenterId(u)||curCenter)}</td><td>${u.active===false?'Disabled':'Active'}</td><td>${u.lastLogin?u.lastLogin.replace('T',' ').slice(0,16):'Never'}</td><td>${canManageCredential(u)?`<button class="btn sm ghost" onclick="resetPasswordModal('${u.username}')">Reset</button>`:'No access'}</td></tr>`).join('')}</tbody></table></div></div>`;};
