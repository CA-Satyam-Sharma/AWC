const CARD_STATUSES=['Trial','15 Days Card','30 Days Card','Other Days Card'];
function cleanPhone(x){return String(x||'').replace(/\D/g,'').slice(0,10);}
function isPhone10(x){return /^\d{10}$/.test(String(x||''));}
function phoneAttrs(){return `inputmode="numeric" maxlength="10" pattern="\\d{10}" oninput="this.value=this.value.replace(/\\D/g,'').slice(0,10)"`;}
function readRequiredPhone(id,label='Mobile'){const el=document.getElementById(id),val=cleanPhone(el?.value||'');if(el)el.value=val;if(!isPhone10(val)){toast(label+' must be exactly 10 digits');return null;}return val;}
function cardTotalForStatus(status,otherDays){if(status==='Trial')return 4;if(status==='15 Days Card')return 15;if(status==='30 Days Card')return 30;if(status==='Other Days Card')return Math.max(1,+otherDays||0);return 0;}
function cardStatusOptions(selected=''){return `<option value="Trial" ${selected==='Trial'?'selected':''}>Trial (4 days card)</option><option value="15 Days Card" ${selected==='15 Days Card'?'selected':''}>15 days card</option><option value="30 Days Card" ${selected==='30 Days Card'?'selected':''}>30 days card</option><option value="Other Days Card" ${selected==='Other Days Card'?'selected':''}>Other days card</option><option value="Active" ${selected==='Active'?'selected':''}>Active member</option><option value="Inactive" ${selected==='Inactive'?'selected':''}>Inactive</option>`;}
function cardChoiceScript(prefix){return `const s=document.getElementById('${prefix}_status').value,box=document.getElementById('${prefix}_carddays_box'),note=document.getElementById('${prefix}_cardnote');if(box)box.style.display=s==='Other Days Card'?'block':'none';if(note){const d=s==='Trial'?4:s==='15 Days Card'?15:s==='30 Days Card'?'30':(s==='Other Days Card'?(document.getElementById('${prefix}_carddays').value||'custom'):'');note.style.display=d?'block':'none';note.innerHTML=d==='custom'?'Enter custom card days.':('Card will track '+d+' day(s). Attendance/check-in consumes days.');}`;}
function cardStartDate(m){return m?.cardPlan?.startDate||m?.trial?.startDate||m?.joinedAt||today();}
function applyCardPlan(m,status,otherDays){const total=cardTotalForStatus(status,otherDays);if(total){m.cardPlan={kind:status,totalDays:total,startDate:m.cardPlan?.startDate||m.trial?.startDate||today(),createdAt:m.cardPlan?.createdAt||new Date().toISOString(),updatedAt:new Date().toISOString()};if(status==='Trial'){m.trial=m.trial||{startDate:m.cardPlan.startDate,fee:1000,day1Free:true,days:Array(total).fill(false),converted:false};m.trial.startDate=m.cardPlan.startDate;m.trial.days=Array.from({length:total},(_,i)=>m.trial.days?.[i]||false);}else m.trial=null;}else{m.cardPlan=null;if(status!=='Trial')m.trial=null;}return total;}
function cardUsage(m){const total=m?.cardPlan?.totalDays||cardTotalForStatus(m?.status,m?.cardPlan?.totalDays)||0;if(!total)return null;const start=cardStartDate(m);const dates=new Set((m.attendance||[]).map(a=>typeof a==='string'?a:a?.date).filter(d=>d&&(!start||d>=start)));let consumed=dates.size;if(!consumed&&m.trial?.days)consumed=m.trial.days.filter(Boolean).length;consumed=Math.min(consumed,total);return {total,start,consumed,remaining:Math.max(0,total-consumed)};}
function cardUsageLabel(m){const u=cardUsage(m);return u?`${u.consumed}/${u.total} used · ${u.remaining} left`:'—';}

  {id:'more_protein',name:'More Protein',shakeMate:3,formula1:2,protein:2,fiber:0,charge:6100},
  {id:'basic_protein_fiber',name:'Basic Protein with Fiber',shakeMate:3,formula1:2,protein:1,fiber:1,charge:6700},
  {id:'more_protein_fiber',name:'More Protein with Fiber',shakeMate:3,formula1:2,protein:2,fiber:1,charge:7300}
];
function centerCardPackage(id){return CENTER_CARD_PACKAGES.find(p=>p.id===id)||CENTER_CARD_PACKAGES[0];}
function centerCardPackageOptions(selected){return CENTER_CARD_PACKAGES.map(p=>`<option value="${p.id}" ${p.id===selected?'selected':''}>${p.name} - ${rs(p.charge)}</option>`).join('');}
function cardPackageLabel(m){if(!cardTotalForStatus(m?.status,m?.cardPlan?.totalDays))return '-';if(m.status==='Trial')return 'Trial card';const p=centerCardPackage(m.cardPackageId);return p?p.name:'-';}
function cardPackageCharge(status,pkgId){return status==='Trial'?1000:(cardTotalForStatus(status,45)?centerCardPackage(pkgId).charge:0);}
function cardServingText(m){if(!cardTotalForStatus(m?.status,m?.cardPlan?.totalDays))return '-';if(m.status==='Trial')return 'Trial serving as advised by coach';const p=centerCardPackage(m.cardPackageId);return `Shake Mate ${p.shakeMate}, Formula 1 ${p.formula1}, Protein ${p.protein}, Fiber ${p.fiber||0}`;}
function cardFormScript(prefix){return `${cardChoiceScript(prefix)};const st=document.getElementById('${prefix}_status').value,pkgBox=document.getElementById('${prefix}_pkg_box'),charge=document.getElementById('${prefix}_charge');if(pkgBox)pkgBox.style.display=(st==='15 Days Card'||st==='30 Days Card'||st==='Other Days Card')?'block':'none';if(charge){const pkg=document.getElementById('${prefix}_cardpkg')?.value||'basic_protein';const val=st==='Trial'?1000:((st==='15 Days Card'||st==='30 Days Card'||st==='Other Days Card')?${JSON.stringify(Object.fromEntries(CENTER_CARD_PACKAGES.map(p=>[p.id,p.charge])))}[pkg]:0);charge.value=val||'';}`;}
function cardDueDate(m){const u=cardUsage(m);return u?addDays(u.start,u.total-1):'';}
function cardPaymentLabel(m){const p=m.cardPayment||{};return p.charge?`${rs(+p.received||0)} / ${rs(+p.charge||0)} ${p.mode?'('+p.mode+')':''}`:'-';}
function attendanceDates(m){return [...new Set((m.attendance||[]).map(a=>typeof a==='string'?a:a?.date).filter(Boolean))].sort();}
function attendanceShort(m){const ds=attendanceDates(m);return ds.length?ds.map(d=>`<span class="chip">${d}</span>`).join(' '):'<span class="muted">No attendance recorded.</span>';}
function attendanceEditChips(m){const ds=attendanceDates(m);return ds.length?ds.map(d=>`<span class="chip">${d} <button class="btn sm ghost" style="padding:2px 6px;margin-left:4px" onclick="removePastAttendance('${m.id}','${d}')">x</button></span>`).join(' '):'<span class="muted">No attendance recorded.</span>';}
function addPastAttendance(id){const m=member(id),d=v('e_attdate');if(!d)return toast('Choose attendance date');if((m.attendance||[]).some(a=>(typeof a==='string'?a:a.date)===d))return toast('Date already added');m.attendance=m.attendance||[];m.attendance.push({date:d,centerId:curCenter||m.centerId,markedBy:curUser?.username||'system',markedAt:new Date().toISOString(),source:'manual-past-entry'});m.updatedBy=curUser?.username||'system';m.updatedAt=new Date().toISOString();save();editMemberModal(id);toast('Past attendance added');}
function removePastAttendance(id,date){const m=member(id);m.attendance=(m.attendance||[]).filter(a=>(typeof a==='string'?a:a.date)!==date);m.updatedBy=curUser?.username||'system';m.updatedAt=new Date().toISOString();save();editMemberModal(id);toast('Attendance date removed');}
function cardMetaFields(prefix,m={}){const status=m.status||'Trial',pkg=m.cardPackageId||'basic_protein',pay=m.cardPayment||{},joined=m.joinedAt||today();return `<div><label>Joining / card start date</label><input id="${prefix}_joined" type="date" value="${joined}"></div><div id="${prefix}_pkg_box" style="display:${['15 Days Card','30 Days Card','Other Days Card'].includes(status)?'block':'none'}"><label>Center serving card package</label><select id="${prefix}_cardpkg" onchange="${cardFormScript(prefix)}">${centerCardPackageOptions(pkg)}</select></div><div><label>Card charges</label><input id="${prefix}_charge" type="number" value="${pay.charge||cardPackageCharge(status,pkg)}"></div><div><label>Amount received</label><input id="${prefix}_received" type="number" value="${pay.received||''}"></div><div><label>Payment mode</label><select id="${prefix}_paymode"><option ${pay.mode==='Cash'?'selected':''}>Cash</option><option ${pay.mode==='UPI'?'selected':''}>UPI</option><option ${pay.mode==='Card'?'selected':''}>Card</option><option ${pay.mode==='Bank Transfer'?'selected':''}>Bank Transfer</option><option ${pay.mode==='Other'?'selected':''}>Other</option></select></div><div><label>Payment remarks</label><input id="${prefix}_payremarks" value="${pay.remarks||''}"></div><div style="grid-column:1/-1"><label>Center serving note for kitchen</label><input id="${prefix}_servingnote" value="${m.centerServingNote||''}" placeholder="e.g. Less ice, no extra Afresh, serve after workout"></div>`;}
function applyCardMetaFromForm(m,prefix){const status=v(prefix+'_status'),pkg=v(prefix+'_cardpkg')||'basic_protein',joined=v(prefix+'_joined')||m.joinedAt||today();m.joinedAt=joined;m.cardPackageId=pkg;m.centerServingNote=v(prefix+'_servingnote');applyCardPlan(m,status,v(prefix+'_carddays'));if(m.cardPlan){m.cardPlan.startDate=joined;m.cardPlan.packageId=pkg;m.cardPlan.dueDate=cardDueDate(m);}if(m.trial)m.trial.startDate=joined;m.cardPayment={charge:+v(prefix+'_charge')||cardPackageCharge(status,pkg),received:+v(prefix+'_received')||0,mode:v(prefix+'_paymode'),remarks:v(prefix+'_payremarks'),updatedAt:new Date().toISOString(),updatedBy:curUser?.username||'system'};}
addMemberModal=function(){const defaultCoach=role==='coach'?curUser.username:'';openModal(`<div class="flex" style="justify-content:space-between"><h3>Add member</h3><span class="x" onclick="closeModal()">x</span></div><div class="grid2" style="margin-top:8px"><div><label>Full name *</label><input id="m_name"></div><div><label>Mobile * (10 digits)</label><input id="m_mobile" ${phoneAttrs()}></div><div><label>Father name</label><input id="m_father"></div><div><label>WhatsApp</label><input id="m_wa" ${phoneAttrs()}></div><div><label>Email</label><input id="m_email"></div><div><label>Gender</label><select id="m_gender"><option></option><option>Female</option><option>Male</option><option>Other</option></select></div><div><label>Date of birth</label><input id="m_dob" type="date"></div><div><label>Height (cm)</label><input id="m_height" type="number"></div><div><label>Occupation</label><input id="m_occ"></div><div><label>Herbalife ID</label><input id="m_hlid" placeholder="optional"></div><div><label>Referral source</label><select id="m_refsrc"><option>Walk-in</option><option>Social Media</option><option>Referral</option><option>Event</option><option>Other</option></select></div><div><label>Referred by member</label><select id="m_refby">${referralOptions()}</select></div><div><label>Assigned coach</label><select id="m_coach">${coachOptions(defaultCoach)}</select></div><div><label>Status / card</label><select id="m_status" onchange="${cardFormScript('m')}">${cardStatusOptions('Trial')}</select></div><div id="m_carddays_box" style="display:none"><label>Other card days</label><input id="m_carddays" type="number" min="1" max="365" value="45" oninput="${cardFormScript('m')}"></div>${cardMetaFields('m',{status:'Trial',joinedAt:today(),cardPackageId:'basic_protein',cardPayment:{charge:1000,mode:'Cash'}})}<div style="grid-column:1/-1"><label>Address</label><input id="m_addr"></div></div><div id="m_cardnote" class="tier-note">Card will track 4 day(s). Attendance/check-in consumes days.</div><div style="text-align:right;margin-top:6px"><button class="btn" onclick="saveMember()">Save member</button></div>`);};
saveMember=function(){const name=v('m_name').trim(),mobile=readRequiredPhone('m_mobile');if(!name)return toast('Name required');if(!mobile)return;if(S.members.some(m=>m.mobile===mobile))return toast('Mobile already exists');const wa=cleanPhone(v('m_wa'));if(wa&&!isPhone10(wa))return toast('WhatsApp must be exactly 10 digits');const status=v('m_status'),id='M'+Date.now(),code=nextMemberCode(curCenter),who=curUser?.username||'system',coach=(document.getElementById('m_coach')?.value||'').trim();const m=blankMember({id,centerId:curCenter,code,name,fatherName:v('m_father'),mobile,whatsapp:wa,email:v('m_email'),gender:v('m_gender'),dob:v('m_dob'),height:+v('m_height')||null,occupation:v('m_occ'),address:v('m_addr'),herbalifeId:v('m_hlid').trim(),referralSource:v('m_refsrc'),referredById:v('m_refby'),status,assignedCoachId:coach,joinedAt:v('m_joined')||today(),createdBy:who,createdAt:new Date().toISOString(),updatedBy:who,updatedAt:new Date().toISOString()});applyCardMetaFromForm(m,'m');S.members.push(m);syncMembersToParties();save();closeModal();openMember(id);toast('Member added ('+code+') by '+who);};
editMemberModal=function(id){const m=member(id),usage=cardUsage(m),otherDays=m.status==='Other Days Card'?(m.cardPlan?.totalDays||usage?.total||45):45;openModal(`<div class="flex" style="justify-content:space-between"><h3>Edit profile - ${m.name}</h3><span class="x" onclick="closeModal()">x</span></div><div class="grid2" style="margin-top:8px"><div><label>Name</label><input id="e_name" value="${m.name||''}"></div><div><label>Mobile (10 digits)</label><input id="e_mobile" value="${cleanPhone(m.mobile)}" ${phoneAttrs()}></div><div><label>Father name</label><input id="e_father" value="${m.fatherName||''}"></div><div><label>WhatsApp</label><input id="e_wa" value="${cleanPhone(m.whatsapp)}" ${phoneAttrs()}></div><div><label>Email</label><input id="e_email" value="${m.email||''}"></div><div><label>Herbalife ID</label><input id="e_hlid" value="${m.herbalifeId||''}"></div><div><label>Height (cm)</label><input id="e_h" type="number" value="${m.height||''}"></div><div><label>Occupation</label><input id="e_occ" value="${m.occupation||''}"></div><div><label>Referral source</label><select id="e_refsrc"><option ${m.referralSource==='Walk-in'?'selected':''}>Walk-in</option><option ${m.referralSource==='Social Media'?'selected':''}>Social Media</option><option ${m.referralSource==='Referral'?'selected':''}>Referral</option><option ${m.referralSource==='Event'?'selected':''}>Event</option><option ${m.referralSource==='Other'?'selected':''}>Other</option></select></div><div><label>Referred by member</label><select id="e_refby">${referralOptions(m.referredById||'',id)}</select></div><div><label>Assigned coach</label><select id="e_coach">${coachOptions(m.assignedCoachId||'')}</select></div><div><label>Status / card</label><select id="e_status" onchange="${cardFormScript('e')}">${cardStatusOptions(m.status||'Active')}</select></div><div id="e_carddays_box" style="display:${m.status==='Other Days Card'?'block':'none'}"><label>Other card days</label><input id="e_carddays" type="number" min="1" max="365" value="${otherDays}" oninput="${cardFormScript('e')}"></div>${cardMetaFields('e',m)}<div style="grid-column:1/-1"><label>Address</label><input id="e_addr" value="${m.address||''}"></div></div><div id="e_cardnote" class="tier-note" style="${usage?'':'display:none'}">${usage?`Current card: ${usage.consumed}/${usage.total} used, ${usage.remaining} left. Due date: ${cardDueDate(m)||'-'}.`:''}</div><div class="card" style="margin-top:10px;box-shadow:none"><div class="flex" style="justify-content:space-between;align-items:end"><div><h3 style="margin:0">Past attendance / completed card days</h3><div class="mini-metric">Add previous visits for existing members. These reduce remaining card days.</div></div><div><label>Add date</label><input id="e_attdate" type="date" value="${today()}"></div><button class="btn sm" onclick="addPastAttendance('${id}')">Add day</button></div><div style="margin-top:10px">${attendanceEditChips(m)}</div></div><div style="text-align:right;margin-top:10px"><button class="btn" onclick="saveEditMember('${id}')">Save</button></div>`);};
saveEditMember=function(id){const m=member(id),mobile=readRequiredPhone('e_mobile');if(!mobile)return;if(S.members.some(x=>x.id!==id&&x.mobile===mobile))return toast('Mobile already exists');const wa=cleanPhone(v('e_wa'));if(wa&&!isPhone10(wa))return toast('WhatsApp must be exactly 10 digits');m.name=v('e_name');m.mobile=mobile;m.fatherName=v('e_father');m.whatsapp=wa;m.email=v('e_email');m.herbalifeId=v('e_hlid');m.height=+v('e_h')||null;m.occupation=v('e_occ');m.referralSource=v('e_refsrc');m.referredById=v('e_refby');m.assignedCoachId=v('e_coach');m.status=v('e_status');m.address=v('e_addr');applyCardMetaFromForm(m,'e');m.updatedBy=curUser.username;m.updatedAt=new Date().toISOString();syncMembersToParties();save();closeModal();render();toast('Member profile saved');};
function memberListRows(ms){return ms.length?ms.map(m=>`<tr><td>${m.code}</td><td class="clik" onclick="editMemberModal('${m.id}')">${m.name}</td><td>${m.fatherName||'-'}</td><td>${m.mobile}</td><td>${memberRefLabel(m)}</td><td>${memberCoachLabel(m)}</td><td>${m.status}</td><td>${cardPackageLabel(m)}</td><td>${cardUsageLabel(m)}</td><td>${cardDueDate(m)||'-'}</td><td class="r"><button class="btn sm ghost" onclick="editMemberModal('${m.id}')">Edit</button> <button class="btn sm ghost" onclick="openMember('${m.id}')">Open</button></td></tr>`).join(''):'<tr><td colspan="11" class="empty">No members found.</td></tr>';}
viewMembers=function(){const ms=visibleMembers().filter(m=>!memQ||(m.name+' '+m.fatherName+' '+m.mobile+' '+m.code+' '+(m.herbalifeId||'')+' '+memberRefLabel(m)+' '+memberCoachLabel(m)+' '+m.status+' '+cardPackageLabel(m)).toLowerCase().includes(memQ.toLowerCase()));document.getElementById('view').innerHTML=`<div class="page-head"><div><h2>Member Management</h2><p>Master member records with referral, coach, card package, payments and attendance history.</p></div><button class="btn" onclick="addMemberModal()">+ Add member</button></div><div class="card"><label>Search name, father name, mobile, member ID, Herbalife ID, referral, coach or card</label><div class="flex"><input id="member_search" value="${memQ}" onkeydown="if(event.key==='Enter'){memQ=this.value;render()}" style="flex:1"><button class="btn ghost" onclick="memQ=v('member_search');render()">Search</button></div><div class="tablewrap" style="margin-top:12px"><table><thead><tr><th>Member ID</th><th>Name</th><th>Father name</th><th>Mobile</th><th>Referred by</th><th>Coach</th><th>Status</th><th>Package</th><th>Card use</th><th>Due date</th><th class="r">Action</th></tr></thead><tbody>${memberListRows(ms)}</tbody></table></div></div>`;};
viewReception=function(){const ms=visibleMembers();document.getElementById('view').innerHTML=`<div class="page-head"><div><h2>Reception</h2><p>Register members, collect card payment, add backdated visits and track card balance.</p></div><button class="btn" onclick="addMemberModal()">+ Register Member</button></div><div class="card"><div class="tablewrap"><table><thead><tr><th>Code</th><th>Name</th><th>Mobile</th><th>Referred by</th><th>Coach</th><th>Status</th><th>Package</th><th>Payment</th><th>Card use</th><th>Due</th><th>Card</th><th>Check in</th><th class="r">Edit</th></tr></thead><tbody>${ms.map(m=>`<tr><td>${m.code}</td><td class="clik" onclick="editMemberModal('${m.id}')">${m.name}</td><td>${m.mobile}</td><td>${memberRefLabel(m)}</td><td>${memberCoachLabel(m)}</td><td>${m.status}</td><td>${cardPackageLabel(m)}</td><td>${cardPaymentLabel(m)}</td><td>${cardUsageLabel(m)}</td><td>${cardDueDate(m)||'-'}</td><td><button class="btn sm ghost" onclick="printMemberCard('${m.id}')">Print card</button></td><td><button class="btn sm" onclick="markAttendDate('${m.id}')">Check in</button></td><td class="r"><button class="btn sm ghost" onclick="editMemberModal('${m.id}')">Edit</button></td></tr>`).join('')||'<tr><td colspan="13" class="empty">No members found.</td></tr>'}</tbody></table></div></div>`;};
function cardSummaryHTML(m){const u=cardUsage(m);return u?`<div class="card" style="margin-bottom:14px"><div class="grid4"><div><label>Card type</label>${m.status}</div><div><label>Package</label>${cardPackageLabel(m)}</div><div><label>Start date</label>${u.start}</div><div><label>Due date</label>${cardDueDate(m)||'-'}</div><div><label>Consumed</label>${u.consumed} day(s)</div><div><label>Balance</label>${u.remaining} day(s)</div><div><label>Payment</label>${cardPaymentLabel(m)}</div><div><label>Kitchen serving</label>${cardServingText(m)}</div></div><div style="margin-top:8px"><label>Attendance days</label>${attendanceShort(m)}</div></div>`:'';}
printMemberCard=function(id){const m=member(id),u=cardUsage(m),dates=attendanceDates(m),p=m.cardPayment||{};const front=`<div style="display:flex;gap:18px;flex-wrap:wrap;font-family:Arial"><div style="width:340px;border:1px solid #ddd;border-radius:12px;padding:18px"><img src="${LOGO}" style="height:42px"><h2>${m.name}</h2><p><b>ID:</b> ${m.code}</p><p><b>Center:</b> ${(center(m.centerId)||{}).name}</p><p><b>Coach:</b> ${memberCoachLabel(m)}</p><p><b>Status:</b> ${m.status}</p><p><b>Package:</b> ${cardPackageLabel(m)}</p><p><b>Card:</b> ${u?u.consumed+'/'+u.total+' used, '+u.remaining+' left':'-'}</p><p><b>Due date:</b> ${cardDueDate(m)||'-'}</p><div style="border:1px dashed #999;padding:12px;text-align:center">QR / BARCODE</div></div><div style="width:340px;border:1px solid #ddd;border-radius:12px;padding:18px"><h3>Back side - attendance days</h3><p><b>Start:</b> ${u?.start||m.joinedAt||'-'} &nbsp; <b>Payment:</b> ${p.mode||'-'} ${p.received?rs(p.received):''}</p><p><b>Center serving:</b> ${cardServingText(m)}</p><div>${dates.length?dates.map(d=>`<span style="display:inline-block;border:1px solid #ddd;border-radius:999px;padding:5px 8px;margin:3px;font-size:12px">${d}</span>`).join(''):'No attendance yet.'}</div><p style="font-size:11px;color:#555;margin-top:10px">Attendance/check-in consumes card days automatically.</p></div></div>`;printHTML('Member Card '+m.code,front,false);};
function validKitchenCard(m){const u=cardUsage(m);return u&&u.remaining>0;}
viewKitchen=function(){if(!attDate)attDate=today();const present=allSearchableMembers().filter(m=>memberPresentAt(m,attDate,curCenter)&&m.status!=='Inactive'),ms=present.filter(validKitchenCard);document.getElementById('view').innerHTML=`<div class="page-head"><div><h2>Kitchen Today</h2><p>Only members present at ${curCenterObj().name} with valid card balance are served from their center card package.</p></div><div><input type="date" value="${attDate}" onchange="attDate=this.value;render()"></div></div><div class="workflow-guide"><div><b>Source</b><span>Reception/Attendance marks present members.</span></div><div><b>Kitchen serving</b><span>Use card package here. Home diet advice is separate and is not the kitchen serving list.</span></div><div><b>Card control</b><span>Members with zero balance must renew at Reception before serving.</span></div></div><div class="card"><div class="tablewrap">${tableToHTML(['Member','Home center','Card','Balance','Center serving','Serving note','Service'],ms.map(m=>{const rec=kitchenRecordFor(m,attDate),u=cardUsage(m);return [m.name,centerLabel(m.centerId),cardPackageLabel(m),u?u.remaining+' left':'-',cardServingText(m),m.centerServingNote||'-',rec?`<span class="pill ok">${rec.status}</span>`:`<button class="btn sm" onclick="markKitchen('${m.id}','served')">Mark served</button>`];}))}</div>${!ms.length?'<div class="empty">No valid card members to serve for this date. Mark attendance first or renew card at Reception.</div>':''}${present.length>ms.length?`<div class="tier-note" style="margin-top:10px">${present.length-ms.length} present member(s) hidden because card balance is zero or no card is active.</div>`:''}</div>`;};
viewMemberDetail=function(){cardDaysMemberDetailBase();const m=member(curMemberId);if(!m)return;document.getElementById('view').insertAdjacentHTML('afterbegin',cardSummaryHTML(m));};
Object.assign(VIEWS,{mdetail:viewMemberDetail,members:viewMembers,kitchen:viewKitchen,reception:viewReception,attendance:viewAttendance});

/* 02.docx changes: price matrix, Afresh preference, no-card, multi-date attendance and payment report */
const CARD_PACKAGE_PRICES={
  '15 Days Card':{basic_protein:5500,more_protein:6100,basic_protein_fiber:6700,more_protein_fiber:7300},
  '30 Days Card':{basic_protein:9000,more_protein:10200,basic_protein_fiber:11400,more_protein_fiber:12600}
};
centerCardPackageOptions=function(selected){return CENTER_CARD_PACKAGES.map(p=>`<option value="${p.id}" ${p.id===selected?'selected':''}>${p.name}</option>`).join('');};
CENTER_CARD_PACKAGES[2].name='Basic Protein with Fiber';
CENTER_CARD_PACKAGES[3].name='More Protein with Fiber';
cardTotalForStatus=function(status,otherDays){if(status==='Trial')return 4;if(status==='No Card')return 1;if(status==='15 Days Card')return 15;if(status==='30 Days Card')return 30;if(status==='Other Days Card')return Math.max(1,+otherDays||0);return 0;};
cardStatusOptions=function(selected=''){return `<option value="Trial" ${selected==='Trial'?'selected':''}>Trial - Basic Protein, 4 days</option><option value="No Card" ${selected==='No Card'?'selected':''}>No Card - Basic Protein, 1 serving</option><option value="15 Days Card" ${selected==='15 Days Card'?'selected':''}>15 days card</option><option value="30 Days Card" ${selected==='30 Days Card'?'selected':''}>30 days card</option><option value="Other Days Card" ${selected==='Other Days Card'?'selected':''}>Other days card</option><option value="Active" ${selected==='Active'?'selected':''}>Active member</option><option value="Inactive" ${selected==='Inactive'?'selected':''}>Inactive</option>`;};
function cardChargeFor(status,pkgId,current){if(status==='Trial')return 1000;if(status==='No Card')return 500;if(CARD_PACKAGE_PRICES[status])return CARD_PACKAGE_PRICES[status][pkgId||'basic_protein']||0;if(status==='Other Days Card')return +current||0;return 0;}
cardPackageLabel=function(m){if(m?.status==='Trial')return 'Basic Protein';if(m?.status==='No Card')return 'No Card - Basic Protein';if(!cardTotalForStatus(m?.status,m?.cardPlan?.totalDays))return '-';const p=centerCardPackage(m.cardPackageId);return p?p.name:'-';};
cardServingText=function(m){if(!cardTotalForStatus(m?.status,m?.cardPlan?.totalDays))return '-';if(m.status==='Trial'||m.status==='No Card')return 'Basic Protein serving';const p=centerCardPackage(m.cardPackageId);return `Shake Mate ${p.shakeMate}, Formula 1 ${p.formula1}, Protein ${p.protein}, Fiber ${p.fiber||0}`;};
function defaultServingNote(m,status,pkgId,afresh){const fake=m||{};fake.status=status||fake.status;fake.cardPackageId=pkgId||fake.cardPackageId;const fresh=afresh||fake.afreshPreference||'Hot';return `${cardServingText(fake)} | Afresh ${fresh}`;}

function packageServingText(p){

let mlMember='',mlFrom='',mlTo='';

function computeMemberLedger(id,from,to){
  const m=member(id),partyId=memberLedgerPartyId(id),ev=[];
  if(!m)return {opening:0,rows:[],closing:0,tD:0,tC:0,tVp:0};
  const pay=m.cardPayment||{},cardDate=pay.date||m.joinedAt||today(),charge=+pay.charge||0,received=+pay.received||0;
  if(charge)ev.push({date:cardDate,ref:'CARD',desc:`${m.status||'Card'} - ${cardPackageLabel(m)}`,debit:charge,credit:0,vp:0});
  if(received)ev.push({date:cardDate,ref:'PAY',desc:`Card payment - ${pay.mode||'Cash'}`,debit:0,credit:received,vp:0});
  memberOldCards(m).forEach((c,i)=>{
    const oldPay=c.cardPayment||{},oldDate=oldPay.date||c.startDate||today(),suffix=(c.startDate||String(i+1)).replace(/-/g,''),label=c.packageName||c.status||'Old card';
    const oldCharge=+oldPay.charge||0,oldReceived=+oldPay.received||0,period=`${c.startDate||'-'} to ${c.dueDate||'-'}`;
    if(oldCharge)ev.push({date:oldDate,ref:'OLD-'+suffix,desc:`Old card charge - ${label} (${period})`,debit:oldCharge,credit:0,vp:0});
    if(oldReceived)ev.push({date:oldDate,ref:'OLDPAY-'+suffix,desc:`Old card receipt - ${oldPay.mode||'Cash'} - ${label}`,debit:0,credit:oldReceived,vp:0});
  });
  if(partyId){
    S.sales.filter(s=>s.customerId===partyId&&(role==='head'||s.centerId===curCenter)).forEach(s=>{
      ev.push({date:s.date,ref:s.no,desc:`Product sale (${tierLabel(s.tier)}), ${s.items.length} item(s)`,debit:s.subtotal,credit:0,vp:s.totalVp});
      (s.payments||[]).forEach(p=>ev.push({date:p.date||s.date,ref:s.no,desc:`Sale payment - ${p.mode||'Cash'}`,debit:0,credit:+p.amount||0,vp:0}));
    });
    S.barters.filter(b=>b.toType==='member'&&b.customerId===partyId&&(role==='head'||b.centerId===curCenter)).forEach(b=>ev.push({date:b.date,ref:b.no,desc:`Barter ${b.dir} (qty ${b.totalQty})`,debit:0,credit:0,memo:true,vp:b.totalVp}));
  }
  ev.sort((a,b)=>(a.date+a.ref+a.desc).localeCompare(b.date+b.ref+b.desc));
  let opening=0;ev.forEach(e=>{if(from&&e.date<from&&!e.memo)opening+=e.debit-e.credit;});
  let bal=opening,tD=0,tC=0,tVp=0;const rows=[];
  ev.forEach(e=>{if(from&&e.date<from)return;if(to&&e.date>to)return;if(!e.memo)bal+=e.debit-e.credit;tD+=e.debit;tC+=e.credit;tVp+=e.vp;rows.push({...e,bal:e.memo?'':bal});});
  return {opening,rows,closing:bal,tD,tC,tVp};
}

d class="r">${r.credit?rs(r.credit):''}</td><td class="r">${r.memo?'<span class="muted">memo</span>':rs(r.bal)}</td><td class="r">${r.vp?vpf(r.vp):''}</td></tr>`).join(''):'<tr><td colspan="7" class="empty">No ledger activity.</td></tr>'}</tbody><tfoot><tr><td colspan="3">Totals</td><td class="r">${rs(L.tD)}</td><td class="r">${rs(L.tC)}</td><td class="r">${rs(L.closing)}</td><td class="r">${vpf(L.tVp)}</td></tr></tfoot></table></div></div>`;

function archiveCurrentCard(m,reason='renewed',untilDate=''){

function cleanCodePrefix(value){
  return String(value||'').trim().toUpperCase().replace(/\s+/g,'-').replace(/[^A-Z0-9-]/g,'').replace(/-+/g,'-').replace(/^-|-$/g,'');
}
function derivedCenterPrefix(cid){
  const c=center(cid)||{},m=(c.name||'C').match(/Sector\s*(\d+)/i);
  if(m)return 'S'+m[1];
  return 'C'+String((S.centers||[]).findIndex(x=>x.id===cid)+1).padStart(2,'0');
}
centerPrefix=function(cid){
  const stored=cleanCodePrefix((center(cid)||{}).codePrefix);
  return stored||derivedCenterPrefix(cid);
};
nextMemberCode=function(cid){
  const prefix=centerPrefix(cid),marker=prefix+'-';
  const max=(S.members||[]).filter(m=>m.centerId===cid&&String(m.code||'').startsWith(marker)).reduce((a,m)=>{
    const n=parseInt(String(m.code||'').slice(marker.length),10);
    return Math.max(a,Number.isFinite(n)?n:0);
  },0);
  return prefix+'-'+String(max+1).padStart(4,'0');
};

function coachDisplayName(u){
  if(!u)return 'Unassigned';
  const linked=u.memberId?member(u.memberId):null;
  return u.coachName||u.displayName||(linked&&linked.name)||u.username;
}
memberCoachLabel=function(m){
  if(!m?.assignedCoachId)return 'Unassigned';
  return coachDisplayName((S.users||[]).find(u=>u.username===m.assignedCoachId))||m.assignedCoachId;
};

  return '<option value="">Unassigned</option>'+coaches.map(u=>`<option value="${u.username}" ${u.username===selected?'selected':''}>${coachDisplayName(u)} (${u.username})</option>`).join('');

function uniqueUsername(base){

/* Attendance center tracking, guests, daily charge and cleaner reports */
let attReportFilter='all';
function htmlSafe(x){return String(x==null?'':x).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function attendanceCenterId(a,m){return a?.centerId||a?.visitCenterId||m?.centerId||'';}
function attendanceAtCenter(m,date,cid=curCenter){return (m.attendance||[]).find(a=>{const d=typeof a==='string'?a:a?.date;return d===date&&(cid==='all'||attendanceCenterId(a,m)===cid);});}
memberPresentAt=function(m,date,cid=curCenter){return !!attendanceAtCenter(m,date,cid);};
function normalizeAttendanceRecord(m,a){if(typeof a==='string')return {date:a,centerId:m.centerId,homeCenterId:m.centerId,source:'legacy'};return {...a,centerId:attendanceCenterId(a,m),homeCenterId:a.homeCenterId||m.centerId};}
function attendanceRecordsInRange(m,from,to,cid=curCenter){return (m.attendance||[]).map(a=>normalizeAttendanceRecord(m,a)).filter(a=>(!from||a.date>=from)&&(!to||a.date<=to)&&(cid==='all'||a.centerId===cid));}
function dateRangeList(from,to){const s=from||to||today(),e=to||from||today(),out=[];let d=new Date(s+'T00:00:00');const end=new Date(e+'T00:00:00');while(d<=end&&out.length<62){out.push(d.toISOString().slice(0,10));d.setDate(d.getDate()+1);}return out;}
function oldCardVisitLabelForRecord(m,rec){
  const cards=(m.oldCards||[]).filter(c=>{
    const dates=c.presentDates||[];
    return dates.includes(rec.date)||(c.startDate&&c.dueDate&&rec.date>=c.startDate&&rec.date<=c.dueDate);
  }).sort((a,b)=>(b.startDate||'').localeCompare(a.startDate||''));
  const c=cards[0];if(!c)return '';
  const dates=(c.presentDates||[]).slice().sort();
  let idx=dates.indexOf(rec.date)+1;
  if(!idx)idx=dates.filter(d=>d<=rec.date).length||1;
  const total=c.totalDays||dates.length||cardTotalForStatus(c.status,0)||0;
  return total?`${Math.min(idx,total)}/${total}`:'Old card';
}
function memberVisitLabelForRecord(m,rec){
  if(rec.dailyCharge)return 'Daily';
  if((m.status||'')==='Guest')return 'Guest';
  const oldLabel=oldCardVisitLabelForRecord(m,rec);
  if(oldLabel)return oldLabel;
  const u=cardUsage(m),status=m.status||'';
  const records=attendanceRecordsInRange(m,'',rec.date,'all').filter(a=>!u||a.date>=u.start).sort((a,b)=>(a.date+a.centerId).localeCompare(b.date+b.centerId));
  const idx=Math.max(1,records.findIndex(a=>a.date===rec.date&&a.centerId===rec.centerId)+1);
  if(status==='Trial')return idx+'T';
  if(status==='No Card')return 'Daily';
  if(u)return Math.min(idx,u.total)+'/'+u.total;
  return 'No active card';
}
function memberCardVisitLabels(m,date,cid=curCenter){
  const records=attendanceRecordsInRange(m,date,date,cid);
  if(!records.length)return '';
  return [...new Set(records.map(rec=>memberVisitLabelForRecord(m,rec)).filter(Boolean))].join(' + ');
}
function memberCardVisitLabel(m,date,cid=curCenter){
  return memberCardVisitLabels(m,date,cid);
}
function cardCanAttendWithoutDaily(m,date){
  if(!m||m.status==='Inactive')return false;
  if(memberPresentAt(m,date,curCenter))return true;
  if(m.status==='Guest')return true;
  if(m.status==='No Card')return false;
  const u=cardUsage(m);
  if(!u)return false;
  if(date<u.start)return false;
  const usedBefore=new Set((m.attendance||[]).map(a=>normalizeAttendanceRecord(m,a)).filter(a=>a.date>=u.start&&a.date<date).map(a=>a.date+'|'+a.centerId)).size;
  return usedBefore<u.total;
}
function addMemberPaymentRow(m,{date,amount,mode,remarks,cardStatus,packageName}){
  S.memberPayments=S.memberPayments||[];
  const row={id:'MP'+Date.now()+Math.floor(Math.random()*999),date,mode,amount,charge:amount,remarks,centerId:curCenter,memberId:m.id,memberName:m.name,cardStatus:cardStatus||m.status||'No Card',packageName:packageName||cardPackageLabel(m),updatedAt:new Date().toISOString(),updatedBy:curUser?.username||'system'};
  S.memberPayments.push(row);
  return row;
}

function addIsoDate(date,days){const [y,m,d]=dateParts(date),dt=new Date(y,m-1,d);dt.setDate(dt.getDate()+days);return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;}

function attendanceMarkedOrder(m,dates,cid){
  let best=null;
  (m.attendance||[]).forEach((a,i)=>{
    const r=normalizeAttendanceRecord(m,a);
    if(!dates.includes(r.date)||(cid!=='all'&&r.centerId!==cid))return;
    const seq=Number.isFinite(+r.markedSeq)?+r.markedSeq:(Number.isFinite(+r.sheetOrder)?+r.sheetOrder:i);
    const stamp=r.markedAt||`${r.date}T00:00:00.000Z`;
    const key=`${stamp}|${String(seq).padStart(6,'0')}|${String(i).padStart(6,'0')}`;
    if(!best||key<best)best=key;
  });
  return best;
}
function attendanceMatrix(){

  let rows=members.map((m,idx)=>{const vals=dates.map(d=>memberCardVisitLabels(m,d,cid)),records=dates.flatMap(d=>attendanceRecordsInRange(m,d,d,cid));const present=vals.some(Boolean),outside=records.some(a=>a.centerId&&a.centerId!==m.centerId),order=attendanceMarkedOrder(m,dates,cid);return {m,idx,vals,present,outside,order};});
  if(attReportFilter==='yes')rows=rows.filter(r=>r.present);
  if(attReportFilter==='no')rows=rows.filter(r=>!r.present);
  rows.sort((a,b)=>{
    if(a.present&&b.present)return String(a.order||'').localeCompare(String(b.order||''))||a.idx-b.idx||String(a.m.name).localeCompare(String(b.m.name));
    if(a.present!==b.present)return a.present?-1:1;
    return String(a.m.name).localeCompare(String(b.m.name));
  });
  const out=rows.map(r=>[r.m.code,r.m.name,centerLabel(r.m.centerId),r.m.status==='Guest'?'Guest':(r.outside?'Outside':'Home'),...r.vals,r.vals.filter(Boolean).length]);
  const guests=guestRows(from,to,cid).map(g=>['GUEST',g.name,centerLabel(g.centerId),'Guest',...dates.map(d=>g.date===d?'Guest':''),1]);
  return {title:`Attendance ${from} to ${to} - ${centerLabel(cid)}`,head:['Code','Name','Home center','Type',...dates,'Total'],rows:[...out,...guests],foot:null};
}

/* Card dues and daily-charge visibility */
function cardChargeAmount(m){return +(m?.cardPayment?.charge||0);}
function cardReceivedAmount(m){return +(m?.cardPayment?.received||0);}
function cardDueAmount(m){return Math.max(0,cardChargeAmount(m)-cardReceivedAmount(m));}
function cardPaymentState(m){
  const charge=cardChargeAmount(m),received=cardReceivedAmount(m),due=cardDueAmount(m);
  if(!charge)return {charge,received,due,state:'none',label:'-'};
  if(due<=0)return {charge,received,due:0,state:'paid',label:`Paid ${rs(received)}`};
  if(received>0)return {charge,received,due,state:'partial',label:`Partial ${rs(received)} / ${rs(charge)} | Due ${rs(due)}`};
  return {charge,received,due,state:'due',label:`Due ${rs(due)}`};
}
function cardPaymentBadge(m){
  const p=cardPaymentState(m);
  if(p.state==='paid')return `<span class="pill ok">${p.label}</span>`;
  if(p.state==='partial')return `<span class="pill partial">${p.label}</span>`;
  if(p.state==='due')return `<span class="pill warn">${p.label}</span>`;
  return '<span class="muted">-</span>';
}
function cardPaymentWarningHTML(m){
  const p=cardPaymentState(m);
  if(p.state==='due')return `<div class="due-banner" style="margin-top:8px">Card payment pending: ${rs(p.due)}</div>`;
  if(p.state==='partial')return `<div class="due-banner" style="margin-top:8px">Partial card payment received. Balance due: ${rs(p.due)}</div>`;
  return '';
}
const dueFlowSyncMemberPaymentLedgerBase=syncMemberPaymentLedger;
syncMemberPaymentLedger=function(m){
  const pay=m.cardPayment||{},amt=+pay.received||0;
  if(!amt&&pay.ledgerId){
    S.memberPayments=(S.memberPayments||[]).filter(x=>x.id!==pay.ledgerId);
    delete pay.ledgerId;
    return;
  }
  dueFlowSyncMemberPaymentLedgerBase(m);
};
cardPaymentLabel=function(m){
  const p=cardPaymentState(m);
  if(p.state==='none')return '-';
  const mode=m?.cardPayment?.mode?` (${m.cardPayment.mode})`:'';
  return `${rs(p.received)} / ${rs(p.charge)}${mode}${p.due?` | Due ${rs(p.due)}`:' | Paid'}`;
};
cardUsageLabel=function(m){
  const u=cardUsage(m),p=cardPaymentState(m);
  if(!u)return '-';
  const day=`${Math.min(u.consumedRaw,u.total)}/${u.total} used · ${Math.max(0,u.remaining)} left${u.overLimit?' · expired':''}`;
  return p.due?`${day} · ${p.state==='partial'?'partial due':'payment due'}`:day;
};
function visitPaymentSuffix(m){

  if(p.state==='due')return ' Due';
  if(p.state==='partial')return ' Partial';

}
memberVisitLabelForRecord=function(m,rec){

  if(oldLabel)return oldLabel;

  const records=attendanceRecordsInRange(m,'',rec.date,'all').filter(a=>!u||a.date>=u.start).sort((a,b)=>(a.date+a.centerId).localeCompare(b.date+b.centerId));
  const idx=Math.max(1,records.findIndex(a=>a.date===rec.date&&a.centerId===rec.centerId)+1);
  const suffix=visitPaymentSuffix(m);
  if(status==='Trial')return `${idx}T${suffix}`;

const dueFlowComputeMemberLedgerBase=computeMemberLedger;
computeMemberLedger=function(id,from,to){
  const m=member(id);
  const L=dueFlowComputeMemberLedgerBase(id,from,to);
  if(!m)return L;
  const extra=(S.memberPayments||[]).filter(p=>p.memberId===id&&p.id!==m.cardPayment?.ledgerId&&(!from||p.date>=from)&&(!to||p.date<=to));
  if(!extra.length)return L;
  const rows=[...L.rows];
  extra.forEach(p=>{

    ]

function ensureCardSettings(){
  const d=defaultCardSettings();
  S.cardSettings=S.cardSettings||{};
  S.cardSettings.addonRates={...d.addonRates,...(S.cardSettings.addonRates||{})};
  S.cardSettings.statuses={...d.statuses,...(S.cardSettings.statuses||{})};
  S.cardSettings.packages=(S.cardSettings.packages&&S.cardSettings.packages.length?S.cardSettings.packages:d.packages).map(p=>({...p,active:p.active!==false}));
  return S.cardSettings;
}
function activePackageSettings(){return ensureCardSettings().packages.filter(p=>p.active!==false);}
function statusSetting(status){return ensureCardSettings().statuses[status]||{};}
centerCardPackage=function(id){return ensureCardSettings().packages.find(p=>p.id===id)||ensureCardSettings().packages[0]||CENTER_CARD_PACKAGES[0];};
cardTierName=function(status){return statusSetting(status).label||status||'';};
cardTotalForStatus=function(status,otherDays){if(status==='Other Days Card')return Math.max(1,+otherDays||0);return +statusSetting(status).days||0;};
function computedPackageCharge(status,pkgId,current){
  const st=statusSetting(status),p=centerCardPackage(pkgId),rates=ensureCardSettings().addonRates,days=+st.days||0;
  if(status==='Trial'||status==='No Card')return +st.charge||0;
  if(status==='Other Days Card')return +current||0;
  if(!days||!p)return 0;
  const base=(+p.dinoShake||0)>0?(+st.dinoBase||0):(+st.basicBase||0);
  const baseProtein=(+p.dinoShake||0)>0?0:1;
  const proteinUnits=Math.max(0,(+p.protein||0)-baseProtein);
  const proteinExtra=(proteinUnits===0.5?(+rates.halfProteinPerDay||0):proteinUnits*(+rates.extraProteinPerDay||0))*days;
  const fiberExtra=Math.max(0,+p.fiber||0)*(+rates.extraFiberPerDay||0)*days;
  return Math.round(base+proteinExtra+fiberExtra);
}
cardChargeFor=function(status,pkgId,current){return computedPackageCharge(status,pkgId,current);};
cardPackageOptionsFor=function(status,selected){
  if(status==='Guest')return `<option value="basic_protein" ${selected==='basic_protein'?'selected':''}>Guest / Lead</option>`;
  const keys=(status==='Trial'||status==='No Card')?['basic_protein']:activePackageSettings().map(p=>p.id);

};

  <fieldset><legend>Family Members</legend>${tableToHTML(['Name','Relation','DOB','Mobile','Gender','Notes'],familyRows)}</fieldset>
  <p class="disc">This form is for wellness tracking only and does not replace professional medical advice, diagnosis or treatment. Confidential blood report values are intentionally excluded from this printed form.</p>`;
  printHTML('Complete Wellness Form - '+m.name,inner,true);
};

/* Supabase shared-state backend */
const SUPABASE_BACKEND={
  url:'https://qesvwjrnqjszcrrlhvfw.supabase.co',
  key:'sb_publishable_c3OxyvnRfNQV-Ud1zOSqbg_zJX2rml0',
  table:'awc_app_state',
  appKey:'stock_sales_demo_v10'
};
let remoteSyncReady=false,remoteSyncPaused=false,remoteSaveTimer=null,remoteSyncStatus='Supabase connecting';
function remoteHeaders(extra){return Object.assign({apikey:SUPABASE_BACKEND.key,Authorization:'Bearer '+SUPABASE_BACKEND.key,Accept:'application/json'},extra||{});}
function remoteUrl(params){return SUPABASE_BACKEND.url+'/rest/v1/'+SUPABASE_BACKEND.table+(params||'');}
function paintSupabaseStatus(){
  const ctx=document.getElementById('ctx');if(!ctx||!authed)return;
  const existing=document.getElementById('sync_status');if(existing)existing.remove();
  const tone=remoteSyncStatus.includes('offline')||remoteSyncStatus.includes('failed')?'partial':remoteSyncStatus.includes('saved')||remoteSyncStatus.includes('loaded')||remoteSyncStatus.includes('ready')?'ok':'';
  ctx.insertAdjacentHTML('beforeend',`<span id="sync_status" class="pill ${tone}" title="Supabase backend sync">${remoteSyncStatus}</span>`);
}
function setRemoteStatus(msg){remoteSyncStatus=msg;paintSupabaseStatus();}
async function pullRemoteState(){
  const path='?app_key=eq.'+encodeURIComponent(SUPABASE_BACKEND.appKey)+'&select=payload,updated_at';
  const res=await fetch(remoteUrl(path),{headers:remoteHeaders()});
  if(!res.ok)throw new Error('Supabase load failed '+res.status);
  const rows=await res.json();
  const row=Array.isArray(rows)?rows[0]:null;
  if(!row||!row.payload)return false;
  remoteSyncPaused=true;
  S=row.payload;
  ensureV6();ensureV10();
  localStorage.setItem('hl_app_v7',JSON.stringify(S));
  remoteSyncPaused=false;
  setRemoteStatus('Supabase loaded');
  render();
  return true;
}
async function pushRemoteState(){
  if(!remoteSyncReady||remoteSyncPaused||!S)return;
  const res=await fetch(remoteUrl('?on_conflict=app_key'),{
    method:'POST',
    headers:remoteHeaders({'Content-Type':'application/json',Prefer:'resolution=merge-duplicates,return=minimal'}),
    body:JSON.stringify({app_key:SUPABASE_BACKEND.appKey,payload:S,updated_at:new Date().toISOString()})
  });
  if(!res.ok)throw new Error('Supabase save failed '+res.status);
  setRemoteStatus('Supabase saved');
}
function queueRemoteSave(){
  if(!remoteSyncReady||remoteSyncPaused)return;
  setRemoteStatus('Supabase saving');
  clearTimeout(remoteSaveTimer);
  remoteSaveTimer=setTimeout(()=>pushRemoteState().catch(e=>{console.warn(e);setRemoteStatus('Supabase offline');}),900);
}
const supabaseLocalSave=save;
save=function(){supabaseLocalSave();queueRemoteSave();};
async function initSupabaseBackend(){
  if(!SUPABASE_BACKEND.url||!SUPABASE_BACKEND.key||!window.fetch){setRemoteStatus('Supabase offline');return;}
  remoteSyncReady=false;
  try{
    const found=await pullRemoteState();
    remoteSyncReady=true;
    if(!found){await pushRemoteState();setRemoteStatus('Supabase ready');}
  }catch(e){
    console.warn(e);
    remoteSyncReady=false;
    setRemoteStatus('Supabase offline');
  }
}
const v10SessionRenderBase=render;render=function(){v10SessionRenderBase();if(authed)persistSession();paintSupabaseStatus();};
load();restoreSession();render();initSupabaseBackend();
</script>
